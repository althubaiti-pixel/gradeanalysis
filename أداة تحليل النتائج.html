  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ar\" dir=\"rtl\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>أداة تحليل نتائج المقررات — الكلية التقنية بميسان<\u002Ftitle>\n<style>/* ============================================================\n   خطوط الهوية — الكلية التقنية بميسان\n   Brand fonts. Two official families, FULLY SELF-HOSTED from the\n   uploaded brand files — no external CDN dependency.\n   - Cairo: Light 300, Regular 400, Bold 700\n   - DIN Next Arabic: Light 300, Regular 400, Bold 700\n   ============================================================ */\n\n/* ---- Cairo ---- */\n@font-face {\n  font-family: 'Cairo';\n  src: url(\"62f72da2-e3aa-4bae-ad2a-d3b001de4b81\") format('truetype');\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Cairo';\n  src: url(\"9c1a0564-483a-41ad-aaa4-d0f844e0ef77\") format('truetype');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Cairo';\n  src: url(\"1058b480-9810-4a38-94c6-127b158a4878\") format('truetype');\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* ---- DIN Next Arabic ---- */\n@font-face {\n  font-family: 'DIN Next Arabic';\n  src: url(\"29ee511a-2470-476d-9732-b42304910249\") format('truetype');\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'DIN Next Arabic';\n  src: url(\"a2281759-5a35-4aef-a8a4-2524d930dc9d\") format('truetype');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'DIN Next Arabic';\n  src: url(\"618bcfec-78a2-41c2-be94-9d833f372cea\") format('truetype');\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   الألوان — Color tokens\n   Primary identity = deep teal. Cool slate support, cool neutrals,\n   functional semantics only. See DESIGN.md §2.\n   ============================================================ */\n\n:root {\n  /* ---- الأساسي: الأخضر المزرقّ (Teal) ---- */\n  --color-teal-50:  #e6f0ef;\n  --color-teal-100: #d6e8e4;\n  --color-teal-200: #a9cfc9;\n  --color-teal-300: #5a9a8f;\n  --color-teal-400: #3a8a85;\n  --color-teal-500: #0e6b66; /* الأساسي / primary */\n  --color-teal-600: #0c5551;\n  --color-teal-700: #0a4744;\n  --color-teal-800: #093f3c;\n  --color-teal-900: #062d2b;\n\n  /* ribbon/accent teal lifted from the official PPTX template (#0e7f79) */\n  --color-teal-ribbon: #0e7f79;\n\n  /* ---- المساند: الأزرق الرمادي (Slate) ---- */\n  --color-slate-300: #8aa9b3;\n  --color-slate-500: #4a7d8c;\n  --color-slate-700: #355a66;\n\n  /* ---- المحايدات: الورق والحبر (cool neutrals) ---- */\n  --color-paper:       #f5f8f8; /* page background */\n  --color-surface:     #ffffff; /* card background */\n  --color-border:      #dce6e6; /* borders & dividers */\n  --color-text-strong: #16302e; /* primary text */\n  --color-text-soft:   #3f5a58; /* secondary text */\n  --color-text-mute:   #7b918f; /* muted text & labels */\n\n  /* ---- الدلالية: الحالة (semantics) ---- */\n  --color-success: #2d7d6f;\n  --color-warning: #b8862f;\n  --color-error:   #a8463a;\n  --color-info:    #4a7d8c; /* matches slate-500 */\n\n  --color-success-soft: #e3f0ed;\n  --color-warning-soft: #f5ecd9;\n  --color-error-soft:   #f3e1de;\n\n  /* ---- أسماء دلالية للسطوح والنص (semantic aliases) ---- */\n  --bg-page:       var(--color-paper);\n  --surface-card:  var(--color-surface);\n  --surface-header: var(--color-teal-800);\n  --border-default: var(--color-border);\n\n  --text-strong: var(--color-text-strong);\n  --text-body:   var(--color-text-soft);\n  --text-mute:   var(--color-text-mute);\n  --text-on-dark: #ffffff;\n\n  --interactive:       var(--color-teal-500);\n  --interactive-hover: var(--color-teal-600);\n  --interactive-soft:  var(--color-teal-50);\n  --link:              var(--color-teal-500);\n\n  /* ---- تدرّج تصوير البيانات (data-viz scale, low → high) ---- */\n  --dataviz-1: var(--color-error);   /* الأدنى */\n  --dataviz-2: var(--color-warning);\n  --dataviz-3: var(--color-slate-500);\n  --dataviz-4: var(--color-teal-400);\n  --dataviz-5: var(--color-teal-500); /* الأعلى */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   الخطوط والأحجام — Typography tokens\n   Two official families. DIN Next Arabic is substituted with\n   IBM Plex Sans Arabic until the licensed webfont is supplied.\n   Modular scale, base 1rem = 16px, ratio ~1.2. See DESIGN.md §4.\n   ============================================================ */\n\n:root {\n  /* font families */\n  --font-din:   'DIN Next Arabic', 'IBM Plex Sans Arabic', sans-serif; /* Regular self-hosted; IBM Plex covers 300/700 until DIN Light/Bold supplied */\n  --font-cairo: 'Cairo', sans-serif;\n\n  /* default UI family — Cairo (the family we have on file) */\n  --font-ui: var(--font-cairo);\n\n  /* size scale */\n  --text-xs:   0.78rem;\n  --text-sm:   0.9rem;\n  --text-base: 1rem;\n  --text-lg:   1.2rem;\n  --text-xl:   1.5rem;\n  --text-2xl:  1.9rem;\n  --text-3xl:  2.4rem;\n\n  /* weights */\n  --weight-body:   400; /* جسم النص */\n  --weight-value:  500; /* القيم العددية */\n  --weight-strong: 700; /* عناوين ووسوم */\n\n  /* line heights */\n  --leading-tight: 1.2;\n  --leading-snug:  1.4;\n  --leading-normal: 1.6;\n\n  /* semantic type aliases */\n  --type-display: var(--weight-strong) var(--text-3xl)/var(--leading-tight) var(--font-ui);\n  --type-title:   var(--weight-strong) var(--text-2xl)/var(--leading-tight) var(--font-ui);\n  --type-heading: var(--weight-strong) var(--text-xl)/var(--leading-snug) var(--font-ui);\n  --type-body:    var(--weight-body) var(--text-base)/var(--leading-normal) var(--font-ui);\n  --type-label:   var(--weight-strong) var(--text-sm)/var(--leading-snug) var(--font-ui);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   المسافات والحواف والظلال — Spacing, radius, borders, shadow\n   Base unit 4px. System separates with thin borders, not heavy\n   shadows. See DESIGN.md §5.\n   ============================================================ */\n\n:root {\n  /* spacing scale (4px base) */\n  --space-1: 0.25rem; /* 4  */\n  --space-2: 0.5rem;  /* 8  */\n  --space-3: 0.75rem; /* 12 */\n  --space-4: 1rem;    /* 16 */\n  --space-5: 1.5rem;  /* 24 */\n  --space-6: 2rem;    /* 32 */\n  --space-8: 3rem;    /* 48 */\n\n  /* radii */\n  --radius-sm:   6px;   /* tags & small elements */\n  --radius-md:   10px;  /* fields & buttons */\n  --radius-lg:   16px;  /* cards */\n  --radius-pill: 999px; /* capsule pills */\n\n  /* borders */\n  --border-width: 1px;\n  --border: var(--border-width) solid var(--color-border);\n\n  /* shadows — intentionally minimal; borders do the separating */\n  --shadow-none: none;\n  --shadow-sm: 0 1px 2px rgba(9, 63, 60, 0.05);\n  --shadow-md: 0 4px 12px rgba(9, 63, 60, 0.08);\n}\n<\u002Fstyle>\n<!-- Canonical Cairo (matches true Cairo glyph shapes); self-hosted @font-face above stays as offline fallback -->\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* arabic */\n@font-face {\n  font-family: 'Cairo';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"828e09d7-4e95-464c-b4b7-18554b989b54\") format('woff2');\n  unicode-range: U+0600-06FF, U+0750-077F, U+0870-088E, U+0890-0891, U+0897-08E1, U+08E3-08FF, U+200C-200E, U+2010-2011, U+204F, U+2E41, U+FB50-FDFF, U+FE70-FE74, U+FE76-FEFC, U+102E0-102FB, U+10E60-10E7E, U+10EC2-10EC4, U+10EFC-10EFF, U+1EE00-1EE03, U+1EE05-1EE1F, U+1EE21-1EE22, U+1EE24, U+1EE27, U+1EE29-1EE32, U+1EE34-1EE37, U+1EE39, U+1EE3B, U+1EE42, U+1EE47, U+1EE49, U+1EE4B, U+1EE4D-1EE4F, U+1EE51-1EE52, U+1EE54, U+1EE57, U+1EE59, U+1EE5B, U+1EE5D, U+1EE5F, U+ ;\n  --slate:     var(--color-slate-500);\n\n  --good: var(--color-success);\n  --warn: var(--color-warning);\n  --bad:  var(--color-error);\n\n  --shell: 1120px;\n}\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\n\nbody {\n  font-family: var(--font-cairo);\n  background: var(--paper);\n  color: var(--ink);\n  font-size: 16px;\n  line-height: 1.8;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* numeric / technical values run LTR, tabular */\n.num, input[type=\"number\"] {\n  direction: ltr;\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: \"tnum\" 1;\n  font-weight: 500;\n}\n\n.shell { max-width: var(--shell); margin: 0 auto; padding: 0 1.75rem; }\n\n/* ============================================================\n   الرأس — Masthead (the single dark moment: teal-800, flat)\n   ============================================================ */\n.masthead {\n  position: relative;\n  background: var(--teal-800);\n  color: #fff;\n  overflow: hidden;\n  border-bottom: 3px solid var(--color-teal-ribbon);\n}\n/* fresh masthead — flat, structured letterhead. no decorative background. */\n.masthead-inner {\n  position: relative;\n  max-width: var(--shell);\n  margin: 0 auto;\n  padding: 2rem 1.75rem;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 2rem;\n}\n.mh-brand {\n  display: flex;\n  align-items: stretch;\n  gap: 1.15rem;\n  min-width: 0;\n}\n.mh-accent {\n  width: 5px;\n  border-radius: 999px;\n  background: var(--color-teal-ribbon);\n  flex-shrink: 0;\n}\n.mh-text { display: flex; flex-direction: column; justify-content: center; min-width: 0; }\n.mh-kicker {\n  font-size: 0.85rem;\n  font-weight: 700;\n  letter-spacing: 0.01em;\n  color: var(--color-teal-200);\n  margin-bottom: 0.4rem;\n}\n.masthead h1 {\n  font-size: clamp(1.7rem, 3.1vw, 2.45rem);\n  font-weight: 700;\n  line-height: 1.16;\n  letter-spacing: -0.015em;\n  color: #fff;\n  text-wrap: balance;\n}\n.mh-college {\n  font-size: 1.02rem;\n  font-weight: 700;\n  color: #fff;\n  margin-bottom: 0.5rem;\n}\n.mh-sub {\n  font-size: 0.9rem;\n  font-weight: 300;\n  color: rgba(255,255,255,0.7);\n  margin-top: 0.55rem;\n}\n.mh-end { display: flex; align-items: center; flex-shrink: 0; }\n.masthead-logo {\n  height: 56px;\n  width: auto;\n  display: block;\n  flex-shrink: 0;\n}\n\n.subbar {\n  background: var(--teal-900);\n  border-top: 1px solid rgba(255,255,255,0.08);\n}\n.subbar-inner {\n  max-width: var(--shell);\n  margin: 0 auto;\n  padding: 0.7rem 1.75rem;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  gap: 0.75rem;\n  flex-wrap: wrap;\n  font-size: 0.8rem;\n  color: rgba(255,255,255,0.68);\n}\n.subbar-inner .designer span { color: var(--color-teal-200); font-weight: 700; }\n\n@media (max-width: 660px) {\n  .masthead-inner { flex-direction: column; align-items: flex-start; gap: 1.4rem; }\n  .mh-end { width: 100%; }\n  .mh-divider { display: none; }\n  .masthead-logo { display: none; }\n}\n@media (min-width: 520px) { .rc-metrics.cols-2 { grid-template-columns: repeat(2, 1fr); } }\n\n/* ============================================================\n   مقدمة — editorial lede (no accent-border card)\n   ============================================================ */\n.lede {\n  max-width: 820px;\n  margin: 3rem 0 3.5rem;\n}\n.lede .eyebrow {\n  display: flex; align-items: center; gap: 0.75rem;\n  font-size: 0.8rem; font-weight: 700; color: var(--teal);\n  margin-bottom: 1rem;\n}\n.lede .eyebrow::after {\n  content: \"\"; flex: 1; height: 1px; background: var(--line);\n}\n.lede p {\n  font-size: clamp(1.12rem, 2vw, 1.4rem);\n  font-weight: 300;\n  line-height: 1.7;\n  color: var(--ink);\n}\n.lede strong { font-weight: 700; color: var(--teal-700); }\n\n/* ============================================================\n   عناوين الأقسام — \"movement\" header w/ ruler rule\n   ============================================================ */\n.movement { margin-bottom: 4.5rem; }\n.movement-head {\n  display: flex;\n  align-items: center;\n  gap: 1rem;\n  margin-bottom: 1.4rem;\n}\n.movement-num {\n  flex-shrink: 0;\n  width: 48px; height: 48px;\n  border-radius: var(--radius-md);\n  background: var(--teal-800);\n  color: #fff;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 1.55rem; font-weight: 700;\n  line-height: 1;\n  direction: ltr;\n}\n.movement-titles { flex: 1; }\n.movement-titles h2 {\n  font-size: clamp(1.4rem, 2.6vw, 1.85rem);\n  font-weight: 700;\n  line-height: 1.2;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n}\n.movement-rule {\n  height: 12px;\n  margin-bottom: 1.2rem;\n  background-image: repeating-linear-gradient(90deg,\n    var(--line) 0 1px, transparent 1px 9px);\n  border-bottom: 1px solid var(--line);\n}\n.movement-intro {\n  max-width: 820px;\n  color: var(--ink-soft);\n  font-size: 1rem;\n  line-height: 1.75;\n  margin-bottom: 1.9rem;\n}\n\n/* ============================================================\n   المحلل — analyzer console\n   ============================================================ */\n.console {\n  background: var(--surface);\n  border: var(--border);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n}\n.console-bar {\n  display: flex; align-items: center; gap: 0.65rem;\n  padding: 0.85rem 1.5rem;\n  background: var(--teal-800);\n  color: #fff;\n  font-size: 0.86rem; font-weight: 700;\n}\n.console-bar .dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: var(--color-teal-ribbon);\n  box-shadow: 0 0 0 3px rgba(14,127,121,0.28);\n}\n.console-bar .spacer { flex: 1; }\n.console-bar .scale {\n  width: 84px; height: 8px;\n  background-image: repeating-linear-gradient(90deg,\n    rgba(255,255,255,0.35) 0 1px, transparent 1px 10px);\n}\n\n.console-inputs {\n  display: grid;\n  grid-template-columns: 1fr;\n}\n@media (min-width: 720px) { .console-inputs { grid-template-columns: 1.3fr 1fr 1fr; } }\n\n.field {\n  padding: 1.4rem 1.5rem;\n  border-bottom: var(--border);\n  border-inline-start: var(--border);\n}\n.field:first-child { border-inline-start: none; }\n.field .flabel {\n  display: flex; align-items: baseline; gap: 0.5rem;\n  font-size: 0.92rem; font-weight: 700; color: var(--ink);\n  margin-bottom: 0.15rem;\n}\n.field .flabel .glyph {\n  font-size: 1rem; color: var(--teal); font-weight: 700; direction: ltr;\n}\n.field .hint { font-size: 0.76rem; color: var(--ink-mute); margin-bottom: 0.7rem; }\n\n.field select,\n.field input {\n  width: 100%;\n  height: 48px;\n  padding: 0 0.85rem;\n  border: var(--border);\n  border-radius: var(--radius-md);\n  background: var(--paper);\n  font-family: var(--font-cairo);\n  font-size: 1.05rem;\n  color: var(--ink);\n  outline: none;\n  transition: border-color 160ms ease, box-shadow 160ms ease;\n}\n.field select {\n  appearance: none;\n  background-image:\n    linear-gradient(45deg, transparent 50%, var(--ink-soft) 50%),\n    linear-gradient(135deg, var(--ink-soft) 50%, transparent 50%);\n  background-position: left 1.1rem top 1.25rem, left 0.78rem top 1.25rem;\n  background-size: 6px 6px, 6px 6px;\n  background-repeat: no-repeat;\n  padding-inline-start: 2rem;\n}\n.field input[type=\"number\"] {\n  direction: ltr; text-align: center;\n  font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\" 1; font-weight: 500;\n}\n.field select:focus,\n.field input:focus {\n  border-color: var(--teal);\n  box-shadow: 0 0 0 3px var(--teal-50);\n}\n\n/* grade entry strip */\n.grades {\n  padding: 1.4rem 1.5rem;\n  background: var(--color-teal-50);\n  border-bottom: var(--border);\n}\n.grades-title {\n  display: flex; align-items: center; gap: 0.6rem;\n  font-size: 0.9rem; font-weight: 700; color: var(--teal-700);\n  margin-bottom: 1rem;\n}\n.grades-title::before {\n  content: \"▮▮\"; font-size: 0.7rem; letter-spacing: -2px; color: var(--teal);\n}\n.grades-fields {\n  display: grid;\n  grid-template-columns: repeat(5, 1fr);\n  gap: 0.7rem;\n}\n@media (max-width: 560px) { .grades-fields { grid-template-columns: repeat(2, 1fr); } }\n.gfield { display: flex; flex-direction: column; gap: 0.45rem; }\n.gfield label {\n  display: flex; align-items: center; justify-content: center; gap: 0.4rem;\n  font-size: 0.82rem; font-weight: 700; color: var(--ink-soft);\n}\n.gfield label .dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }\n.gfield input {\n  width: 100%; height: 46px; padding: 0;\n  border: var(--border); border-radius: var(--radius-md);\n  background: #fff; color: var(--ink);\n  font-family: var(--font-cairo); font-size: 1.15rem;\n  direction: ltr; text-align: center;\n  font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\" 1; font-weight: 500;\n  outline: none; transition: border-color 160ms ease, box-shadow 160ms ease;\n}\n.gfield input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-50); }\n\n/* عدد المتدربين المستمرين */\n.ga-count-row {\n  display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap;\n  padding-bottom: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--line);\n}\n.ga-count-label { font-size: 0.92rem; font-weight: 700; color: var(--ink-soft); }\n.ga-count-input {\n  width: 110px; height: 42px; padding: 0 0.8rem;\n  border: var(--border); border-radius: var(--radius-md); background: #fff; color: var(--ink);\n  font-family: var(--font-cairo); font-size: 1.1rem; text-align: center; outline: none;\n  transition: border-color 160ms ease, box-shadow 160ms ease;\n}\n.ga-count-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-50); }\n.ga-budget { font-size: 0.9rem; font-weight: 700; color: var(--teal-700); }\n.ga-budget.full { color: var(--ink-mute); }\n\n/* الكتلة: الجدول يسار، الأشرطة يمين */\n.ga-main { display: grid; grid-template-columns: 1fr; gap: 1.2rem; }\n@media (min-width: 720px) { .ga-main { grid-template-columns: 1fr 260px; align-items: start; } }\n\n/* جدول النطاقات (يسار) */\n.ga-ranges { background: var(--paper); border: var(--border); border-radius: var(--radius-md); padding: 0.9rem 1rem; }\n.ga-ranges-title { font-size: 0.85rem; font-weight: 700; color: var(--ink-soft); margin-bottom: 0.6rem; }\n.ga-ranges-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }\n.ga-ranges-table td { padding: 0.4rem 0.2rem; border-bottom: 1px solid var(--line); }\n.ga-ranges-table tr:last-child td { border-bottom: none; }\n.ga-ranges-table .gar-name { font-weight: 700; color: var(--ink-soft); }\n.ga-ranges-table .gar-name .dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-left: 0.4rem; vertical-align: middle; }\n.ga-ranges-table .gar-range { text-align: left; color: var(--teal-700); font-weight: 500; direction: ltr; }\n\n/* الأشرطة (يمين) */\n.ga-sliders { display: flex; flex-direction: column; gap: 0.85rem; }\n.ga-srow { display: grid; grid-template-columns: 80px 1fr 36px; align-items: center; gap: 0.8rem; }\n.ga-srow label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; font-weight: 700; color: var(--ink-soft); }\n.ga-srow label .dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }\n.ga-srow input[type=\"range\"] { width: 100%; accent-color: var(--teal); cursor: pointer; }\n.ga-srow input[type=\"range\"]:disabled { cursor: not-allowed; opacity: 0.5; }\n.ga-sval { text-align: center; font-size: 1rem; font-weight: 500; color: var(--teal-700); background: var(--paper); border: var(--border); border-radius: var(--radius-sm); padding: 0.18rem 0; }\n\n/* dataviz band dots (low → high): ضعيف…ممتاز */\n.dot-fail { background: var(--dataviz-1); }\n.dot-pass { background: var(--dataviz-2); }\n.dot-good { background: var(--dataviz-3); }\n.dot-vgood { background: var(--dataviz-4); }\n.dot-excellent { background: var(--dataviz-5); }\n\n.placeholder-msg {\n  padding: 2.5rem 1.5rem;\n  text-align: center;\n  color: var(--ink-mute);\n  font-size: 0.96rem;\n}\n\n/* ============================================================\n   النتيجة — result readout\n   ============================================================ */\n.analyzer-result { display: block; position: relative; margin-top: 1.5rem; }\n.analyzer-result.show { animation: rise 320ms cubic-bezier(.2,.7,.3,1) both; }\n/* الحالة الفارغة: الحاويات بأحجامها الحقيقية وتقسيمها، فارغة، ورسالة داخل حاويتي الشكل والخلاصة */\n.card-prompt { display: none; }\n#result.is-empty .verdict-banner { background: var(--surface); box-shadow: none; border: 1px solid var(--color-border); }\n#result.is-empty .verdict-banner .vb-mark,\n#result.is-empty .verdict-banner .vb-text { visibility: hidden; }\n#result.is-empty .rc-body,\n#result.is-empty .rc-shape .shape-plate,\n#result.is-empty .rc-summary .recommend { visibility: hidden; }\n#result.is-empty .rc-shape .shape-side,\n#result.is-empty .rc-summary .summary-content { position: relative; }\n#result.is-empty .rc-shape .card-prompt,\n#result.is-empty .rc-summary .card-prompt {\n  display: flex; position: absolute; inset: 0;\n  align-items: center; justify-content: center; text-align: center;\n  padding: 0.5rem 1rem;\n  color: var(--ink-mute); font-size: 0.95rem; font-weight: 600; line-height: 1.7;\n}\n@keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }\n\n.verdict-banner {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 1rem; flex-wrap: wrap;\n  padding: 1.4rem 1.75rem;\n  border-radius: var(--radius-lg);\n  color: #fff;\n  margin-bottom: 1.25rem;\n  transition: background 320ms ease;\n  background: var(--teal-700);\n}\n.verdict-banner .vb-left { display: flex; align-items: center; gap: 0.9rem; }\n.verdict-banner .vb-mark {\n  width: 38px; height: 38px; flex-shrink: 0;\n  border: 2px solid rgba(255,255,255,0.55);\n  border-radius: 50%;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 1.1rem;\n}\n.verdict-banner .vb-text { font-size: 1.3rem; font-weight: 700; line-height: 1.3; }\n.verdict-banner .vb-badge {\n  font-size: 1.05rem; font-weight: 500;\n  background: rgba(255,255,255,0.16);\n  padding: 0.4rem 1rem; border-radius: var(--radius-md);\n  direction: ltr; white-space: nowrap;\n  font-variant-numeric: tabular-nums;\n}\n\n.containers { display: grid; grid-template-columns: 1fr; gap: 1.1rem; }\n@media (min-width: 860px) {\n  .containers { grid-template-columns: 1fr 1fr; }\n  .rc-shape, .rc-summary { grid-column: 1 / -1; }\n}\n\n.rc {\n  background: var(--surface);\n  border: var(--border);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n}\n.rc-head {\n  display: flex; align-items: center; gap: 0.7rem;\n  padding: 1rem 1.4rem;\n  border-bottom: var(--border);\n  background: #fbfdfd;\n}\n.rc-icon {\n  width: 34px; height: 34px; flex-shrink: 0;\n  background: var(--teal-800); color: #fff;\n  border-radius: var(--radius-sm);\n  display: flex; align-items: center; justify-content: center;\n  font-size: 1.05rem; font-weight: 700; direction: ltr;\n}\n.rc-name { font-weight: 700; color: var(--ink); font-size: 1.05rem; flex: 1; }\n.rc-tag {\n  font-size: 0.82rem; font-weight: 700;\n  padding: 0.28rem 0.85rem; border-radius: var(--radius-pill);\n  color: #fff; white-space: nowrap;\n  display: inline-flex; align-items: center; gap: 0.4rem;\n  background: var(--slate);\n}\n.rc-tag::before {\n  content: \"\"; width: 7px; height: 7px; border-radius: 50%;\n  background: rgba(255,255,255,0.9);\n}\n.rc-body {\n  padding: 1.2rem 1.4rem;\n  color: var(--ink-soft);\n  font-size: 0.97rem;\n  line-height: 1.85;\n}\n\n.rc-metrics {\n  display: grid; grid-template-columns: 1fr;\n  border-bottom: var(--border);\n}\n@media (min-width: 520px) { .rc-metrics { grid-template-columns: repeat(3, 1fr); } }\n.rcm {\n  padding: 1.05rem 1.1rem; text-align: center;\n  border-inline-start: var(--border);\n}\n.rcm:first-child { border-inline-start: none; }\n.rcm-label { font-size: 0.74rem; color: var(--ink-mute); margin-bottom: 0.4rem; line-height: 1.4; }\n.rcm-val {\n  font-size: 1.5rem; font-weight: 700; color: var(--teal-800);\n  direction: ltr; font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\" 1;\n}\n.rcm-val.text { direction: rtl; font-size: 1.05rem; font-weight: 700; }\n\n/* grade strip (μ position) */\n.grade-strip { display: flex; direction: ltr; border-bottom: var(--border); }\n.grade-strip--rtl { direction: rtl; }\n.gs-seg {\n  flex: 1; text-align: center;\n  padding: 0.75rem 0.3rem;\n  font-size: 0.82rem; font-weight: 700;\n  color: var(--ink-mute);\n  background: var(--paper);\n  border-inline-start: 1px solid var(--line);\n  transition: background 280ms ease, color 280ms ease;\n  position: relative;\n}\n.gs-seg:first-child { border-inline-start: none; }\n.gs-seg.active { color: #fff; background: var(--teal); }\n.gs-seg.active::after {\n  content: \"▲\"; position: absolute; bottom: -1px; left: 50%;\n  transform: translateX(-50%) translateY(100%);\n  color: var(--teal); font-size: 0.55rem;\n}\n\n/* distribution chart */\n.dist-chart-wrap { padding: 1.5rem; background: var(--surface); }\n.dist-chart-wrap canvas {\n  display: block; width: 100%; height: auto;\n  max-width: 600px; margin: 0 auto; direction: ltr;\n}\n\n/* حاوية الشكل: نمط القسم الثالث (التوزيع يمين، الشرح يسار) */\n.rc-shape { overflow: hidden; }\n.shape-side { display: grid; grid-template-columns: 1fr; }\n@media (min-width: 640px) {\n  .shape-side { grid-template-columns: 1fr 1.3fr; }\n}\n.shape-plate {\n  background: var(--paper); padding: 1.3rem 1.5rem; direction: ltr;\n  display: flex; align-items: center; justify-content: center;\n  border-top: var(--border);\n}\n@media (min-width: 640px) {\n  .shape-plate { border-top: none; border-inline-start: var(--border); }\n}\n.shape-plate canvas { display: block; width: 100%; height: auto; max-width: 100%; }\n.shape-info { padding: 1.3rem 1.5rem; display: flex; flex-direction: column; justify-content: center; }\n.shape-info .rc-body { margin: 0; font-size: 0.95rem; line-height: 1.85; }\n\n/* summary / recommendation */\n.rc-summary { border-color: var(--line); }\n.rc-summary .rc-head { background: var(--color-teal-50); }\n.rc-summary .rc-icon { background: var(--good); }\n.recommend {\n  margin: 0 1.4rem 1.4rem;\n  background: var(--color-success-soft);\n  border-radius: var(--radius-md);\n  padding: 1rem 1.2rem;\n  font-size: 0.95rem; line-height: 1.8;\n  color: #1c5a4f;\n  border-inline-start: 3px solid var(--good);\n}\n.recommend strong { color: #143f38; font-weight: 700; }\n\n/* tag colour classes (set by JS) */\n.tag-good  { background: var(--good) !important; }\n.tag-warn  { background: var(--warn) !important; }\n.tag-bad   { background: var(--bad)  !important; }\n.tag-tight { background: var(--slate) !important; }\n\n/* ============================================================\n   المؤشرات الثلاثة — triad dark panel (rhythm moment)\n   ============================================================ */\n.triad {\n  position: relative;\n  background: var(--teal-800);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n  padding: 2.4rem 2rem 2.6rem;\n  color: #fff;\n}\n.triad-motif { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.14; pointer-events: none; }\n.triad-motif path { fill: none; stroke: #ffffff; stroke-width: 1.5; vector-effect: non-scaling-stroke; }\n.triad-grid {\n  position: relative; z-index: 2;\n  display: grid; grid-template-columns: 1fr; gap: 1.5rem;\n}\n@media (min-width: 820px) {\n  .triad-grid { grid-template-columns: 1fr 1fr 1fr; gap: 0; }\n}\n.triad-item {\n  padding: 0.5rem 1.6rem;\n  position: relative;\n}\n@media (min-width: 820px) {\n  .triad-item { border-inline-start: 1px solid rgba(255,255,255,0.14); }\n  .triad-item:first-child { border-inline-start: none; }\n}\n.triad-glyph {\n  font-size: 3.6rem; line-height: 1; font-weight: 700;\n  color: var(--color-teal-200); direction: ltr;\n  margin-bottom: 0.6rem;\n}\n.triad-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }\n.triad-q {\n  font-size: 0.92rem; font-weight: 700; color: #fff;\n  padding-bottom: 0.7rem; margin-bottom: 0.7rem;\n  border-bottom: 1px dashed rgba(255,255,255,0.22);\n}\n.triad-desc { font-size: 0.9rem; line-height: 1.8; color: rgba(255,255,255,0.78); font-weight: 300; }\n.triad-link {\n  position: relative; z-index: 2;\n  display: flex; justify-content: center;\n  margin-top: 1.6rem;\n}\n.triad-chain {\n  display: inline-flex; align-items: center; gap: 0.8rem;\n  font-size: 0.82rem; font-weight: 700; color: var(--color-teal-200);\n}\n.triad-chain .step { display: inline-flex; align-items: center; gap: 0.55rem; }\n.triad-chain .g { color: #fff; font-size: 1.05rem; direction: ltr; }\n.triad-chain .arr { color: rgba(255,255,255,0.5); }\n\n/* ============================================================\n   الشرح المفصل للمؤشرات (القسم ٣) — لوحة خضراء فاتحة\n   ============================================================ */\n.triad-detail {\n  display: grid; gap: 1rem;\n  background: #eaf4f0;\n  border: 1px solid #cfe6dd;\n  border-radius: var(--radius-lg);\n  padding: 1.5rem;\n}\n@media (min-width: 760px) {\n  .triad-detail { grid-template-columns: repeat(3, 1fr); }\n}\n.td-item {\n  background: #fff;\n  border: 1px solid #d9e8e2;\n  border-radius: var(--radius-md);\n  padding: 1.1rem 1.2rem;\n}\n.td-head { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.7rem; }\n.td-glyph {\n  font-size: 1.25rem; font-weight: 800; direction: ltr;\n  color: var(--teal-700);\n  width: 2.1rem; height: 2.1rem; flex: none;\n  display: flex; align-items: center; justify-content: center;\n  background: #eaf4f0; border-radius: var(--radius-sm);\n}\n.td-name { font-size: 1.02rem; font-weight: 800; color: var(--ink); }\n.td-desc { font-size: 0.9rem; line-height: 1.9; color: var(--ink-soft); }\n\n/* ============================================================\n   التسلسل — reading them together (section 3)\n   ============================================================ */\n.steps {\n  background: var(--surface);\n  border: var(--border);\n  border-radius: var(--radius-lg);\n  padding: 1.75rem 1.9rem;\n  margin-bottom: 1.5rem;\n}\n.steps h4 {\n  font-size: 1.08rem; font-weight: 700; color: var(--teal-700);\n  margin-bottom: 1.1rem;\n  display: flex; align-items: center; gap: 0.6rem;\n}\n.steps h4::before {\n  content: \"\"; width: 22px; height: 2px; background: var(--color-teal-ribbon);\n}\n.steps ol { list-style: none; counter-reset: s; display: grid; gap: 0.85rem; }\n.steps li {\n  counter-increment: s;\n  display: grid; grid-template-columns: 30px 1fr; gap: 0.85rem;\n  align-items: start;\n  color: var(--ink-soft); font-size: 0.96rem; line-height: 1.8;\n}\n.steps li::before {\n  content: counter(s);\n  width: 30px; height: 30px;\n  background: var(--teal-50); color: var(--teal-700);\n  border: 1px solid var(--color-teal-200);\n  border-radius: var(--radius-sm);\n  display: flex; align-items: center; justify-content: center;\n  font-size: 0.9rem; font-weight: 700; direction: ltr;\n}\n\n.flow {\n  display: grid; grid-template-columns: 1fr; gap: 1rem;\n}\n@media (min-width: 760px) {\n  .flow { grid-template-columns: 1fr auto 1fr auto 1fr; align-items: stretch; }\n}\n.flow-card {\n  background: var(--surface);\n  border: var(--border);\n  border-radius: var(--radius-lg);\n  padding: 1.5rem 1.4rem;\n  text-align: center;\n}\n.flow-card .fglyph {\n  font-size: 2.2rem; font-weight: 700; color: var(--teal);\n  direction: ltr; line-height: 1; margin-bottom: 0.7rem;\n}\n.flow-card .ftitle { font-weight: 700; color: var(--ink); font-size: 1.05rem; margin-bottom: 0.4rem; }\n.flow-card .fdesc { font-size: 0.9rem; color: var(--ink-soft); line-height: 1.75; }\n.flow-arrow {\n  display: flex; align-items: center; justify-content: center;\n  color: var(--color-teal-300); font-size: 1.5rem; min-height: 36px;\n}\n\n/* ============================================================\n   أشكال التوزيع — specimen rows (section 4)\n   كل شكل في صف منفرد. تخطيطان: side (مخطط يمينا/شرح يسارا)\n   و stack (مخطط أعلى/شرح أسفله).\n   ============================================================ */\n.specimens { display: flex; flex-direction: column; gap: 1.4rem; }\n\n.specimen {\n  background: var(--surface);\n  border: var(--border);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n  transition: border-color 200ms ease;\n}\n.specimen:hover { border-color: var(--color-teal-300); }\n\n/* اللوحة (الرسم) والمحور */\n.specimen-plate {\n  background: var(--paper);\n  padding: 1.3rem 1.4rem 0.7rem;\n  direction: ltr;\n}\n.specimen-plate svg { display: block; width: 100%; height: auto; }\n.specimen-axis {\n  height: 9px; margin-top: 0.4rem;\n  background-image: repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 22px);\n  border-top: 1px solid var(--line);\n}\n\n/* جسم الشرح */\n.specimen-body { padding: 1.4rem 1.6rem; }\n.specimen-name {\n  display: flex; align-items: center; gap: 0.7rem;\n  font-weight: 700; color: var(--ink); font-size: 1.25rem;\n  padding-bottom: 0.85rem; margin-bottom: 0.95rem;\n  border-bottom: 1px solid var(--line);\n}\n.specimen-tag {\n  font-size: 0.74rem; font-weight: 700; color: #fff;\n  padding: 0.24rem 0.75rem; border-radius: var(--radius-pill);\n}\n.specimen-mean { font-size: 0.98rem; color: var(--ink-soft); line-height: 1.85; margin-bottom: 0.75rem; }\n.specimen-act { font-size: 0.95rem; color: var(--teal-700); line-height: 1.8; font-weight: 500; }\n.specimen-mean strong, .specimen-act strong { font-weight: 700; color: var(--ink); }\n.specimen-act strong { color: var(--teal-800); }\n\n/* تخطيط جانبي: المخطط يمينا، الشرح يسارا (للجرسي والمائل للقمة) */\n.specimen-side { display: grid; grid-template-columns: 1fr; }\n@media (min-width: 720px) {\n  .specimen-side { grid-template-columns: 300px 1fr; }\n  .specimen-side .specimen-plate {\n    border-inline-end: var(--border);\n    display: flex; flex-direction: column; justify-content: center;\n  }\n}\n.specimen-side .specimen-plate { border-bottom: var(--border); }\n@media (min-width: 720px) {\n  .specimen-side .specimen-plate { border-bottom: none; }\n}\n\n/* تخطيط عمودي: المخطط أعلى، الشرح أسفله (لبقية الأشكال) */\n.specimen-stack .specimen-plate { border-bottom: var(--border); }\n.specimen-stack .specimen-plate svg { max-width: 520px; margin: 0 auto; }\n\n/* ============================================================\n   المختبر التفاعلي — interactive lab (القسم ٤)\n   ============================================================ */\n.lab {\n  background: var(--surface);\n  border: var(--border);\n  border-radius: var(--radius-lg);\n  padding: 1.5rem 1.6rem;\n}\n\n/* شريط التقييم العلوي */\n.lab-topbar {\n  display: flex; align-items: center; gap: 0.9rem; flex-wrap: wrap;\n  padding-bottom: 1.3rem; margin-bottom: 1.4rem; border-bottom: 1px solid var(--line);\n}\n.lab-flabel { font-size: 0.95rem; font-weight: 700; color: var(--ink-soft); }\n.lab-topbar select {\n  font-family: var(--font-cairo); font-size: 0.98rem; color: var(--ink);\n  background: var(--paper); border: var(--border); border-radius: var(--radius-md);\n  padding: 0.55rem 0.9rem; cursor: pointer; min-width: 200px;\n}\n.lab-topbar select:focus { outline: none; border-color: var(--teal); }\n\n/* الكتلة الرئيسية: التحكم يمينا، العرض يسارا */\n.lab-main { display: grid; grid-template-columns: 1fr; gap: 1.6rem; }\n@media (min-width: 820px) { .lab-main { grid-template-columns: 1fr 1fr; align-items: start; } }\n\n/* جهة التحكم */\n.lab-control-pane { display: flex; flex-direction: column; gap: 1.1rem; }\n\n/* التوزيعات الجاهزة (فوق الأشرطة) */\n.lab-presets-bar { display: flex; flex-direction: column; gap: 0.6rem; }\n.lab-presets-label { font-size: 0.85rem; font-weight: 700; color: var(--ink-mute); }\n.lab-presets { display: flex; flex-wrap: wrap; gap: 0.45rem; }\n.lab-presets button {\n  font-family: var(--font-cairo); font-size: 0.82rem; font-weight: 700; color: var(--teal-700);\n  background: var(--color-teal-50); border: 1px solid var(--color-teal-200); border-radius: var(--radius-pill);\n  padding: 0.36rem 0.85rem; cursor: pointer; transition: background 160ms ease, color 160ms ease, border-color 160ms ease;\n}\n.lab-presets button:hover { background: var(--teal); color: #fff; border-color: var(--teal); }\n\n/* الأشرطة */\n.lab-sliders { display: flex; flex-direction: column; gap: 0.8rem; }\n.lab-srow { display: grid; grid-template-columns: 64px 1fr 38px; align-items: center; gap: 0.85rem; }\n.lab-srow label { font-size: 0.9rem; font-weight: 700; color: var(--ink-soft); }\n.lab-srow input[type=\"range\"] { width: 100%; accent-color: var(--teal); cursor: pointer; }\n.lab-sval {\n  text-align: center; font-size: 1.02rem; font-weight: 500; color: var(--teal-700);\n  background: var(--paper); border: var(--border); border-radius: var(--radius-sm); padding: 0.18rem 0;\n}\n\n/* الرصيد + إعادة التعيين (تحت الأشرطة مباشرة) */\n.lab-budget {\n  display: flex; align-items: center; justify-content: space-between; gap: 1rem;\n  background: var(--color-teal-50); border: 1px solid var(--color-teal-200);\n  border-radius: var(--radius-md); padding: 0.7rem 1rem;\n}\n.lab-budget-main { display: flex; flex-direction: column; gap: 0.15rem; }\n.lab-budget-label { font-size: 0.82rem; font-weight: 600; color: var(--teal-700); }\n.lab-budget-num {\n  font-family: var(--font-cairo);\n  display: flex; align-items: baseline; gap: 0.35rem;\n  font-size: 1.5rem; font-weight: 700; color: var(--teal-800); line-height: 1.1;\n}\n.lab-budget-of { font-size: 0.85rem; font-weight: 500; color: var(--teal-700); }\n.lab-reset {\n  flex-shrink: 0;\n  font-family: var(--font-cairo); font-size: 0.84rem; font-weight: 700;\n  color: var(--teal-700); background: var(--surface);\n  border: 1px solid var(--color-teal-300); border-radius: var(--radius-md);\n  padding: 0.5rem 1rem; cursor: pointer; transition: background 160ms ease, color 160ms ease, border-color 160ms ease;\n}\n.lab-reset:hover { background: var(--teal-700); color: #fff; border-color: var(--teal-700); }\n.lab-remain-note { font-size: 0.84rem; color: var(--ink-mute); }\n\n/* جهة العرض: المخطط + المؤشرات */\n.lab-view-pane { display: flex; flex-direction: column; gap: 1.1rem; }\n.lab-chart-box {\n  background: var(--paper); border: var(--border); border-radius: var(--radius-md);\n  padding: 1.2rem; direction: ltr; display: flex; align-items: center; justify-content: center;\n}\n.lab-chart-box canvas { display: block; width: 100%; height: auto; }\n.lab-metrics { display: flex; flex-direction: column; gap: 0; border: var(--border); border-radius: var(--radius-md); overflow: hidden; }\n.lab-metric {\n  display: flex; align-items: baseline; justify-content: space-between; gap: 0.8rem;\n  padding: 0.8rem 1rem; border-bottom: 1px solid var(--line); background: var(--surface);\n}\n.lab-metric:last-child { border-bottom: none; }\n.lab-metric-label { font-size: 0.9rem; color: var(--ink-soft); font-weight: 600; }\n.lab-metric-val { font-size: 1.15rem; font-weight: 700; color: var(--teal-800); }\n.lab-metric-shape { background: var(--color-teal-50); }\n.lab-metric-shape .lab-metric-val { font-size: 1rem; color: var(--teal-700); }\n\n.lab-narrative {\n  font-size: 0.92rem; line-height: 1.8; color: var(--ink-soft);\n  background: var(--paper); border: var(--border); border-radius: var(--radius-md);\n  padding: 0.85rem 1rem; margin: 1.4rem 0 0;\n}\n\n/* ============================================================\n   حقول البيانات الاختيارية + تصدير PDF\n   ============================================================ */\n.meta-fields {\n  display: grid; grid-template-columns: 1fr; gap: 1rem;\n  background: var(--surface); border: var(--border); border-radius: 0;\n  padding: 1.3rem 1.4rem; margin-bottom: 1.1rem;\n}\n@media (min-width: 680px) { .meta-fields { grid-template-columns: 1fr 1fr; } }\n@media (min-width: 920px) { .meta-fields { grid-template-columns: repeat(4, 1fr); } }\n.meta-field { display: flex; flex-direction: column; gap: 0.45rem; min-width: 0; }\n.meta-label { font-size: 0.9rem; font-weight: 700; color: var(--ink-soft); }\n.meta-opt { font-size: 0.78rem; font-weight: 500; color: var(--ink-mute); }\n.meta-input {\n  font-family: var(--font-cairo); font-size: 0.98rem; color: var(--ink);\n  background: var(--paper); border: var(--border); border-radius: var(--radius-md);\n  padding: 0.6rem 0.8rem; width: 100%; max-width: 100%; box-sizing: border-box;\n}\n.meta-input:focus { outline: none; border-color: var(--teal); }\n\n.export-bar { display: flex; justify-content: flex-start; gap: 0.7rem; margin-top: 1.3rem; padding: 0 0.6rem 0.8rem 0; }\n.export-btn {\n  font-family: var(--font-cairo); font-size: 0.98rem; font-weight: 700; color: #fff;\n  background: var(--teal); border: none; border-radius: var(--radius-md);\n  padding: 0.7rem 1.5rem; cursor: pointer; transition: background 160ms ease, opacity 160ms ease;\n}\n.export-btn:hover:not(:disabled) { background: var(--teal-700); }\n.export-btn:disabled { background: #c5cdcc; color: #eef2f1; cursor: not-allowed; }\n.reset-btn {\n  font-family: var(--font-cairo); font-size: 0.95rem; font-weight: 700; color: var(--teal-700);\n  background: var(--surface); border: 1px solid var(--color-teal-300); border-radius: var(--radius-md);\n  padding: 0.7rem 1.3rem; cursor: pointer; transition: background 160ms ease, color 160ms ease, opacity 160ms ease;\n}\n.reset-btn:hover:not(:disabled) { background: var(--teal-700); color: #fff; border-color: var(--teal-700); }\n.reset-btn:disabled { background: #f0f3f2; color: #b3bdbc; border-color: #dde4e3; cursor: not-allowed; }\n\n/* ===== مناطق الإدخال: بيانات المدرب / بيانات التحليل / المؤشرات ===== */\n.zone-title {\n  font-size: 0.82rem; font-weight: 800; color: var(--teal-700);\n  margin: 1.1rem 0 0.5rem; padding-inline-start: 0.2rem;\n  display: flex; align-items: center; gap: 0.5rem;\n}\n.zone-title::before {\n  content: \"\"; width: 4px; height: 14px; border-radius: 2px;\n  background: var(--teal); display: inline-block;\n}\n.meta-fields.cols3 { margin-bottom: 0.4rem; }\n@media (min-width: 920px) { .meta-fields.cols3 { grid-template-columns: repeat(3, 1fr); } }\nselect.meta-input {\n  font-family: var(--font-cairo); font-size: 0.98rem; color: var(--ink);\n  background: var(--paper); border: var(--border); border-radius: var(--radius-md);\n  padding: 0.6rem 0.8rem; cursor: pointer;\n  width: 100%; max-width: 100%; box-sizing: border-box; text-overflow: ellipsis;\n}\nselect.meta-input:focus { outline: none; border-color: var(--teal); }\n.meta-locked { background: var(--surface); color: var(--ink-soft); cursor: default; }\n.console-inputs.kpi { grid-template-columns: 1fr; }\n@media (min-width: 720px) { .console-inputs.kpi { grid-template-columns: 1fr 1fr; } }\n\n/* ===== شريط الإجراءات + التلميح ===== */\n.action-bar { display: flex; justify-content: flex-start; gap: 0.7rem; margin-top: 1.3rem; padding: 0 0.6rem 0 0; }\n.add-hint { font-size: 0.82rem; color: var(--ink-mute); margin: 0.5rem 0.2rem 0; min-height: 1.1rem; }\n\n/* ===== قائمة التقارير المضافة ===== */\n.queue { margin-top: 1rem; border: var(--border); border-radius: var(--radius-md); background: var(--surface); overflow: hidden; }\n.queue-head {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0.7rem 0.9rem; border-bottom: var(--border); background: var(--paper);\n}\n.queue-count { font-size: 0.9rem; font-weight: 800; color: var(--ink-soft); }\n.queue-clear {\n  font-family: var(--font-cairo); font-size: 0.8rem; font-weight: 700; color: #a8463a;\n  background: none; border: none; cursor: pointer; padding: 0.2rem 0.3rem;\n}\n.queue-clear:hover { text-decoration: underline; }\n.queue-list { display: flex; flex-direction: column; }\n.queue-row {\n  display: flex; align-items: center; justify-content: space-between; gap: 0.8rem;\n  padding: 0.6rem 0.9rem; border-bottom: 1px solid var(--color-border);\n}\n.queue-row:last-child { border-bottom: none; }\n.queue-row.editing { background: #eef6f4; }\n.q-meta { min-width: 0; }\n.q-title { font-size: 0.92rem; font-weight: 700; color: var(--ink); }\n.q-sub { font-size: 0.78rem; color: var(--ink-mute); margin-top: 0.15rem; }\n.q-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }\n.q-btn {\n  font-family: var(--font-cairo); font-size: 0.8rem; font-weight: 700; color: var(--teal-700);\n  background: var(--paper); border: 1px solid var(--color-teal-300); border-radius: var(--radius-md);\n  padding: 0.35rem 0.7rem; cursor: pointer;\n}\n.q-btn:hover:not(:disabled) { background: var(--teal-700); color: #fff; border-color: var(--teal-700); }\n.q-btn:disabled { color: var(--ink-mute); border-color: var(--color-border); background: var(--surface); cursor: default; }\n.q-del { color: #a8463a; border-color: #e2b3ab; }\n.q-del:hover:not(:disabled) { background: #a8463a; color: #fff; border-color: #a8463a; }\n.queue-foot { padding: 0.8rem 0.9rem; }\n.pdf-cage { position: absolute; left: 0; top: 0; width: 0; height: 0; overflow: hidden; }\n#pdfFooter { width: 733px; box-sizing: border-box; padding: 5px 14px; font-family: var(--font-cairo); font-size: 13px; font-weight: 600; color: #6b7280; text-align: center; direction: rtl; background: #fff; }\n\n/* صفحة الطباعة: مخفية في العرض، تظهر في الطباعة فقط */\n.print-sheet { display: none; }\n\n/* ============================================================\n   التذييل — footer\n   ============================================================ */\n.footer {\n  margin-top: 4rem;\n  border-top: 1px solid var(--line);\n  padding: 2.2rem 0 3.5rem;\n  text-align: center;\n  color: var(--ink-mute);\n  font-size: 0.82rem; line-height: 1.95;\n}\n.footer .org-line { font-weight: 700; color: var(--ink-soft); }\n.footer .designer-line span { color: var(--teal-700); font-weight: 700; }\n.footer .rule {\n  width: 140px; height: 9px; margin: 0 auto 1.3rem;\n  background-image: repeating-linear-gradient(90deg,\n    var(--line) 0 1px, transparent 1px -title { font-size: 15px; padding-bottom: 8px; margin-bottom: 8px; }\n#printArea.pdf-cap .ph-org { font-size: 13px; margin-bottom: 3px; }\n#printArea.pdf-cap .ph-dept { font-size: 12px; }\n#printArea.pdf-cap .ph-context td { padding: 2px 10px; font-size: 10.5px; }\n#printArea.pdf-cap .verdict-banner { display: none; }\n#printArea.pdf-cap #result { border-top: 1px solid #d8e0df; padding-top: 16px; margin: 16px 0 0; display: block; }\n#printArea.pdf-cap .containers { display: grid; grid-template-columns: 1fr 1fr; column-gap: 0.5rem; row-gap: 0.95rem; }\n#printArea.pdf-cap .rc-shape, #printArea.pdf-cap .rc-summary { grid-column: 1 / -1; }\n#printArea.pdf-cap .rc { padding: 0; border-radius: 8px; margin: 0; break-inside: avoid; }\n#printArea.pdf-cap .rc-head { margin-bottom: 0; padding: 0.4rem 0.65rem; }\n#printArea.pdf-cap .rc-name { font-size: 0.82rem; }\n#printArea.pdf-cap .rc-icon { width: 20px; height: 20px; font-size: 0.7rem; display: block; line-height: 20px; text-align: center; }\n#printArea.pdf-cap .rc-tag { display: inline-block; font-size: 0.56rem; height: 18px; line-height: 18px; padding: 0 0.5rem; text-align: center; }\n#printArea.pdf-cap .rc-tag::before { display: inline-block; vertical-align: middle; margin-inline-end: 0.35rem; }\n#printArea.pdf-cap .rc-body { font-size: 0.72rem; line-height: 1.5; margin-top: 0; padding: 0.9rem 0.65rem 0.85rem; }\n#printArea.pdf-cap .grade-strip { margin: 0 0 0.35rem; }\n#printArea.pdf-cap .grade-strip .gs-seg { font-size: 0.6rem; padding: 0.25rem 0; }\n#printArea.pdf-cap .rc-metrics { gap: 0; margin: 0; }\n#printArea.pdf-cap .rcm { padding: 0.4rem 0.5rem; }\n#printArea.pdf-cap .rcm-label { font-size: 0.6rem; }\n#printArea.pdf-cap .rcm-val { font-size: 0.98rem; font-weight: 700; color: #093f3c; }\n#printArea.pdf-cap .recommend { font-size: 0.72rem; line-height: 1.5; padding: 0.6rem 0.6rem; margin: 0.7rem 0.65rem 0.75rem; }\n#printArea.pdf-cap .shape-side { display: grid; grid-template-columns: 1fr 1.3fr; }\n#printArea.pdf-cap .shape-plate { padding: 0.4rem 0.6rem; border-inline-start: 1px solid #e5e7eb; }\n#printArea.pdf-cap .shape-info { padding: 0.35rem 0.6rem; }\n#printArea.pdf-cap .shape-info .rc-head { padding: 0 0 0.4rem; margin-bottom: 0.4rem; }\n#printArea.pdf-cap #distChart { width: 100%; height: auto; max-height: 150px; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n  \n\n  <!-- ============ الرأس ============ -->\n  <header class=\"masthead\" data-screen-label=\"الرأس\">\n    <div class=\"masthead-inner\">\n      <div class=\"mh-brand\" data-comment-anchor=\"38fa2f9fef-div\">\n        <div class=\"mh-accent\" style=\"height: 125px\"><\u002Fdiv>\n        <div class=\"mh-text\">\n          <span class=\"mh-kicker\" style=\"font-weight: 200; text-align: right; margin: 0px\">المؤسسة العامة للتدريب التقني والمهني<\u002Fspan>\n          <div class=\"mh-college\" style=\"font-weight: 400; text-align: right; margin: 0px\">الكلية التقنية بميسان<\u002Fdiv>\n          <h1 style=\"padding: 5px 0px 0px\">أداة تحليل النتائج<\u002Fh1>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mh-end\">\n        <img class=\"masthead-logo\" src=\"d4fc056d-7e24-451b-a0e5-1e914ed565ed\" alt=\"المؤسسة العامة للتدريب التقني والمهني — TVTC\" style=\"object-fit: contain; width: 300px; height: 100px\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"subbar\">\n      <div class=\"subbar-inner\">\n        <div style=\"display:flex; align-items:center; gap:1rem; flex-wrap:wrap;\">\n          <span>أداة مساندة لتحليل نتائج المقرر<\u002Fspan>\n\n        <\u002Fdiv>\n        <div class=\"designer\">تصميم: <span>ريان سعيد الثبيتي<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"shell\">\n\n    <!-- مقدمة -->\n    <div class=\"lede\">\n      <div class=\"eyebrow\">مقدمة<\u002Fdiv>\n      <p style=\"font-weight: 300;\">تساعد هذه الأداة المدرب على قراءة نتائج نتائج المقرر وتحليلها. فنتيجة المقرر لا تفهم من <strong>رقم واحد<\u002Fstrong>، بل من <strong>ثلاثة مؤشرات متكاملة<\u002Fstrong> يبني كل منها على الذي قبله.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- القسم 1: المؤشرات الثلاثة -->\n    <section class=\"movement\" data-screen-label=\"القسم ١ — المؤشرات الثلاثة\">\n      <div class=\"movement-head\">\n        <div class=\"movement-num\">١<\u002Fdiv>\n        <div class=\"movement-titles\"><h2>المؤشرات الثلاثة لقراءة نتيجة الاختبار<\u002Fh2><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"movement-rule\"><\u002Fdiv>\n      <p class=\"movement-intro\">هذه نظرة سريعة على الثلاثة مؤشرات لقراءة النتائج. كل مؤشر يجيب عن سؤال مختلف وقراءتها جميعها يحدد مستوى المتدربين بوضوح.<\u002Fp>\n\n      <div class=\"triad\">\n        <div class=\"triad-grid\">\n          <div class=\"triad-item\">\n            <div class=\"triad-glyph\">μ<\u002Fdiv>\n            <div class=\"triad-name\">المتوسط<\u002Fdiv>\n            <div class=\"triad-q\">ما هو مستوى المتدربين؟<\u002Fdiv>\n            <div class=\"triad-desc\">يدل على مستواهم العام. مؤشر مهم لكنه لا يكفي لوحده.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"triad-item\">\n            <div class=\"triad-glyph\">σ<\u002Fdiv>\n            <div class=\"triad-name\">الانحراف المعياري<\u002Fdiv>\n            <div class=\"triad-q\">ما هو مقدار تشتت الدرجات ؟<\u002Fdiv>\n            <div class=\"triad-desc\">مقدار تباعد أو تقارب الدرجات عن المتوسط. يكمل قراءة المتوسط.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"triad-item\">\n            <div class=\"triad-glyph\" style=\"height: 58px\">▮▮▮<\u002Fdiv>\n            <div class=\"triad-name\">شكل التوزيع<\u002Fdiv>\n            <div class=\"triad-q\">كيف توزعت نتائج المتدربين ؟<\u002Fdiv>\n            <div class=\"triad-desc\">صورة توزيع النتائج على التقديرات، تكشف ما قد يخفيه المؤشران السابقان.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- القسم 2: المحلل -->\n    <section class=\"movement\" id=\"analyzerSection\" data-screen-label=\"القسم ٢ — المحلل\">\n      <div class=\"movement-head\">\n        <div class=\"movement-num\">٢<\u002Fdiv>\n        <div class=\"movement-titles\"><h2>تحليل نتيجة الاختبار<\u002Fh2><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"movement-rule\"><\u002Fdiv>\n      <p class=\"movement-intro\">اختر عنصر التقييم، وأدخل متوسط الدرجات والانحراف المعياري وعدد المتدربين حسب كل تقدير، فتعرض الأداة حالة الاختبار وشكل التوزيع وتوصية عملية مباشرة.<\u002Fp>\n\n      <div class=\"console\">\n        <div class=\"console-bar\">\n          <span class=\"dot\"><\u002Fspan>\n          <span>وحدة التحليل<\u002Fspan>\n          <span class=\"spacer\"><\u002Fspan>\n          <span class=\"scale\"><\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- بيانات المدرب: تدخل مرة واحدة وتبقى عبر كل التقارير -->\n        <div class=\"zone-title\" style=\"padding: 0px 15px 0px 0px\">بيانات المدرب<\u002Fdiv>\n        <div class=\"meta-fields cols3\">\n          <div class=\"meta-field\">\n            <label class=\"meta-label\" for=\"metaTrainer\">اسم المدرب<\u002Flabel>\n            <input type=\"text\" id=\"metaTrainer\" class=\"meta-input\" autocomplete=\"off\">\n          <\u002Fdiv>\n          <div class=\"meta-field\">\n            <label class=\"meta-label\" for=\"metaOrg\">اسم المنشأة<\u002Flabel>\n            <input type=\"text\" id=\"metaOrg\" class=\"meta-input meta-locked\" value=\"الكلية التقنية بميسان\" readonly=\"\" autocomplete=\"off\">\n          <\u002Fdiv>\n          <div class=\"meta-field\">\n            <label class=\"meta-label\" for=\"metaDept\">القسم<\u002Flabel>\n            <select id=\"metaDept\" class=\"meta-input\">\n              <option value=\"\" disabled=\"\" selected=\"\">اختر القسم<\u002Foption>\n              <option value=\"قسم الدراسات العامة\">قسم الدراسات العامة<\u002Foption>\n              <option value=\"قسم التقنية الكهربائية\">قسم التقنية الكهربائية<\u002Foption>\n              <option value=\"قسم التقنية الإلكترونية\">قسم التقنية الإلكترونية<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- بيانات التحليل: تتغير من تقرير لآخر -->\n        <div class=\"zone-title\" style=\"padding: 0px 15px 0px 0px;\">بيانات التحليل<\u002Fdiv>\n        <div class=\"meta-fields cols3\">\n          <div class=\"meta-field\">\n            <label class=\"meta-label\" for=\"metaCourse\">المقرر<\u002Flabel>\n            <input type=\"text\" id=\"metaCourse\" class=\"meta-input\" autocomplete=\"off\">\n          <\u002Fdiv>\n          <div class=\"meta-field\">\n            <label class=\"meta-label\" for=\"metaSection\">رقم الشعبة<\u002Flabel>\n            <input type=\"text\" id=\"metaSection\" class=\"meta-input\" autocomplete=\"off\">\n          <\u002Fdiv>\n          <div class=\"meta-field\">\n            <label class=\"meta-label\" for=\"evalType\">عنصر التقييم<\u002Flabel>\n            <select id=\"evalType\" class=\"meta-input\">\n              <option value=\"\" selected=\"\" hidden=\"\"><\u002Foption>\n              <option value=\"mid\">اختبار نصفي<\u002Foption>\n              <option value=\"final\">اختبار نهائي<\u002Foption>\n              <option value=\"total\">المجموع النهائي (١٠٠)<\u002Foption>\n            <\u002Fselect>\n            <div id=\"testLimitWrap\" style=\"margin-top:.55rem\">\n              <label class=\"meta-label\" for=\"testLimit\" style=\"display:block; margin-bottom:.45rem\">حد الاختبار<\u002Flabel>\n              <select id=\"testLimit\" class=\"meta-input\"><\u002Fselect>\n            <\u002Fdiv>\n            <input type=\"hidden\" id=\"inTest\" value=\"\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- مؤشرات التحليل: تتغير من تقرير لآخر -->\n        <div class=\"zone-title\" style=\"padding: 0px 15px 0px 0px;\">مؤشرات التحليل<\u002Fdiv>\n        <div class=\"console-inputs kpi\">\n          <div class=\"field\">\n            <div class=\"flabel\"><span class=\"glyph\">μ<\u002Fspan> المتوسط<\u002Fdiv>\n            <div class=\"hint\" id=\"meanHint\" style=\"margin: 0px 20px 11px 0px\">متوسط درجات المتدربين من 20<\u002Fdiv>\n            <input type=\"number\" id=\"inMean\" min=\"0\" step=\"0.1\">\n          <\u002Fdiv>\n          <div class=\"field\">\n            <div class=\"flabel\"><span class=\"glyph\">σ<\u002Fspan> الانحراف المعياري<\u002Fdiv>\n            <div class=\"hint\" style=\"margin: 0px 20px 11px 0px\">قيمة الانحراف<\u002Fdiv>\n            <input type=\"number\" id=\"inSd\" min=\"0\" step=\"0.1\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"grades\">\n          <div class=\"grades-title\">عدد الحاصلين على كل تقدير<\u002Fdiv>\n\n          <!-- عدد المتدربين المستمرين (إلزامي) -->\n          <div class=\"ga-count-row\">\n            <label class=\"ga-count-label\" for=\"gaTotal\">عدد المتدربين المستمرين<\u002Flabel>\n            <input type=\"number\" id=\"gaTotal\" min=\"1\" step=\"1\" class=\"ga-count-input\">\n            <span class=\"ga-budget\" id=\"gaBudget\">المتبقي: —<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- الجدول يسار + الأشرطة يمين -->\n          <div class=\"ga-main\">\n            <!-- الأشرطة (يمين) -->\n            <div class=\"ga-sliders\" id=\"gaSliders\">\n              <div class=\"ga-srow\"><label><span class=\"dot dot-excellent\"><\u002Fspan>ممتاز<\u002Flabel><input type=\"range\" id=\"raExcellent\" min=\"0\" max=\"0\" value=\"0\" disabled=\"\"><span class=\"num ga-sval\" id=\"vaExcellent\">٠<\u002Fspan><\u002Fdiv>\n              <div class=\"ga-srow\"><label><span class=\"dot dot-vgood\"><\u002Fspan>جيد جدا<\u002Flabel><input type=\"range\" id=\"raVgood\" min=\"0\" max=\"0\" value=\"0\" disabled=\"\"><span class=\"num ga-sval\" id=\"vaVgood\">٠<\u002Fspan><\u002Fdiv>\n              <div class=\"ga-srow\"><label><span class=\"dot dot-good\"><\u002Fspan>جيد<\u002Flabel><input type=\"range\" id=\"raGood\" min=\"0\" max=\"0\" value=\"0\" disabled=\"\"><span class=\"num ga-sval\" id=\"vaGood\">٠<\u002Fspan><\u002Fdiv>\n              <div class=\"ga-srow\"><label><span class=\"dot dot-pass\"><\u002Fspan>مقبول<\u002Flabel><input type=\"range\" id=\"raPass\" min=\"0\" max=\"0\" value=\"0\" disabled=\"\"><span class=\"num ga-sval\" id=\"vaPass\">٠<\u002Fspan><\u002Fdiv>\n              <div class=\"ga-srow\"><label><span class=\"dot dot-fail\"><\u002Fspan>ضعيف<\u002Flabel><input type=\"range\" id=\"raFail\" min=\"0\" max=\"0\" value=\"0\" disabled=\"\"><span class=\"num ga-sval\" id=\"vaFail\">٠<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- جدول نطاقات التقديرات (يسار) -->\n            <div class=\"ga-ranges\">\n              <div class=\"ga-ranges-title\">نطاق درجات كل تقدير<\u002Fdiv>\n              <table class=\"ga-ranges-table\" id=\"gaRanges\"><\u002Ftable>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- حقول مخفية يقرؤها المحلل (تُحدّث من الأشرطة) -->\n          <input type=\"hidden\" id=\"gExcellent\" value=\"0\">\n          <input type=\"hidden\" id=\"gVgood\" value=\"0\">\n          <input type=\"hidden\" id=\"gGood\" value=\"0\">\n          <input type=\"hidden\" id=\"gPass\" value=\"0\">\n          <input type=\"hidden\" id=\"gFail\" value=\"0\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- منطقة الطباعة: الترويسة + النتيجة -->\n      <div id=\"printArea\">\n      <!-- ترويسة التقرير (تظهر في الطباعة فقط، فوق النتيجة) -->\n      <div class=\"print-header\" id=\"printHeader\" aria-hidden=\"true\">\n        <div class=\"ph-top\">\n          <div class=\"ph-org-block\" id=\"phOrgBlock\">\n            <div class=\"ph-org-authority\">المؤسسة العامة للتدريب التقني والمهني<\u002Fdiv>\n            <div class=\"ph-org\" id=\"phOrg\"><\u002Fdiv>\n            <div class=\"ph-dept\" id=\"phDept\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ph-title\">تقرير تحليل النتائج<\u002Fdiv>\n        <\u002Fdiv>\n        <table class=\"ph-context\" id=\"phContext\"><\u002Ftable>\n      <\u002Fdiv>\n\n      <!-- النتيجة -->\n      <div class=\"analyzer-result is-empty\" id=\"result\">\n        <div class=\"verdict-banner\" id=\"verdictBanner\">\n          <div class=\"vb-left\">\n            <span class=\"vb-mark\" aria-hidden=\"true\">\n              <svg viewBox=\"0 0 28 20\" width=\"20\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M1,18 C 8,18 9,3 14,3 C 19,3 20,18 27,18\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n            <div class=\"vb-text\" id=\"verdictText\">—<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"containers\">\n          <!-- حاوية المتوسط -->\n          <div class=\"rc\">\n            <div class=\"rc-head\"><span class=\"rc-icon\">μ<\u002Fspan><span class=\"rc-name\">المتوسط<\u002Fspan><span class=\"rc-tag\" id=\"meanTag\">—<\u002Fspan><\u002Fdiv>\n            <div class=\"rc-metrics cols-2\">\n              <div class=\"rcm\"><div class=\"rcm-label\">المتوسط<\u002Fdiv><div class=\"rcm-val\" id=\"meanValDisp\">—<\u002Fdiv><\u002Fdiv>\n              <div class=\"rcm\"><div class=\"rcm-label\">النطاق المتوقع<\u002Fdiv><div class=\"rcm-val\" id=\"meanExpected\">—<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"grade-strip\" id=\"gradeStrip\">\n              <div class=\"gs-seg\" data-tier=\"ضعيف\">ضعيف<\u002Fdiv>\n              <div class=\"gs-seg\" data-tier=\"مقبول\">مقبول<\u002Fdiv>\n              <div class=\"gs-seg\" data-tier=\"جيد\">جيد<\u002Fdiv>\n              <div class=\"gs-seg\" data-tier=\"جيد جدا\">جيد جدا<\u002Fdiv>\n              <div class=\"gs-seg\" data-tier=\"ممتاز\">ممتاز<\u002Fdiv>\n            <\u002Fdiv>\n            <p class=\"rc-body\" id=\"meanBody\">—<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- حاوية الانحراف -->\n          <div class=\"rc\">\n            <div class=\"rc-head\"><span class=\"rc-icon\">σ<\u002Fspan><span class=\"rc-name\">الانحراف المعياري<\u002Fspan><span class=\"rc-tag\" id=\"sdTag\" data-comment-anchor=\"dbab17d83d-span\">—<\u002Fspan><\u002Fdiv>\n            <div class=\"rc-metrics cols-2\">\n              <div class=\"rcm\"><div class=\"rcm-label\">قيمة الانحراف<\u002Fdiv><div class=\"rcm-val\" id=\"sdValDisp\" data-comment-anchor=\"ab78643e1e-div\">—<\u002Fdiv><\u002Fdiv>\n              <div class=\"rcm\"><div class=\"rcm-label\">النطاق المتوقع<\u002Fdiv><div class=\"rcm-val\" id=\"sdExpected\">—<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"grade-strip grade-strip--rtl\" id=\"sdStrip\" data-comment-anchor=\"b152d3f7ee-div\">\n              <div class=\"gs-seg\" data-sdstate=\"منخفض\">منخفض<\u002Fdiv>\n              <div class=\"gs-seg\" data-sdstate=\"سليم\">سليم<\u002Fdiv>\n              <div class=\"gs-seg\" data-sdstate=\"أوسع من المثالي\">أوسع<\u002Fdiv>\n              <div class=\"gs-seg\" data-sdstate=\"مرتفع\" data-comment-anchor=\"b152d3f7ee-div\">مرتفع<\u002Fdiv>\n            <\u002Fdiv>\n            <p class=\"rc-body\" id=\"sdBody\">—<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- حاوية الشكل: التوزيع يسارا، الدلالة يمينا (نمط القسم الثالث) -->\n          <div class=\"rc rc-shape\">\n            <div class=\"rc-head\"><span class=\"rc-icon\" style=\"font-size: 15px;\">▮▮<\u002Fspan><span class=\"rc-name\">شكل توزيع الدرجات<\u002Fspan><span class=\"rc-tag\" id=\"shapeTag\">—<\u002Fspan><\u002Fdiv>\n            <div class=\"shape-side\">\n              <div class=\"shape-info\">\n                <p class=\"rc-body\" id=\"shapeBody\">—<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"shape-plate\">\n                <canvas id=\"distChart\" width=\"600\" height=\"240\"><\u002Fcanvas>\n              <\u002Fdiv>\n              <div class=\"card-prompt\">أكمل البيانات لتظهر نتائج التحليل<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- حاوية الخلاصة -->\n          <div class=\"rc rc-summary\">\n            <div class=\"rc-head\"><span class=\"rc-icon\">✓<\u002Fspan><span class=\"rc-name\">الخلاصة والتوصية<\u002Fspan><\u002Fdiv>\n            <div class=\"summary-content\">\n              <p class=\"rc-body\" id=\"summaryBody\">—<\u002Fp>\n              <div class=\"recommend\" id=\"recommendBox\">—<\u002Fdiv>\n              <div class=\"card-prompt\">أكمل البيانات لتظهر نتائج التحليل<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv><!-- /printArea -->\n\n      <!-- شريط الإجراءات والقائمة بعد النتائج، ليراجع المدرب التحليل قبل التصدير -->\n      <div class=\"action-bar\">\n        <button type=\"button\" id=\"addReport\" class=\"export-btn\" disabled=\"\">إضافة تقرير<\u002Fbutton>\n        <button type=\"button\" id=\"clearEntry\" class=\"reset-btn\" disabled=\"\">إعادة التعيين<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"queue\" id=\"queue\" style=\"display:none\">\n        <div class=\"queue-head\">\n          <span class=\"queue-count\" id=\"queueCount\">التقارير المضافة<\u002Fspan>\n          <button type=\"button\" id=\"clearQueue\" class=\"queue-clear\">إفراغ القائمة<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"queue-list\" id=\"queueList\"><\u002Fdiv>\n        <div class=\"queue-foot\">\n          <button type=\"button\" id=\"exportAll\" class=\"export-btn\" disabled=\"\">تصدير الكل<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- عنصر ترقيم الصفحات: محبوس في حاوية صفرية حتى لا يؤثر في تخطيط الصفحة، ويُلتقط صورةً بخط Cairo عند التصدير -->\n      <div class=\"pdf-cage\" aria-hidden=\"true\"><div id=\"pdfFooter\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- القسم 3: الشرح المفصل للمؤشرات -->\n    <section class=\"movement\" data-screen-label=\"القسم ٣ — شرح المؤشرات\">\n      <div class=\"movement-head\">\n        <div class=\"movement-num\">٣<\u002Fdiv>\n        <div class=\"movement-titles\"><h2>شرح المؤشرات الثلاثة بالتفصيل<\u002Fh2><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"movement-rule\"><\u002Fdiv>\n      <p class=\"movement-intro\">قراءة أوسع لكل مؤشر بعد استعراض النتيجة، لمن أراد التوسع في فهم دلالاته.<\u002Fp>\n      <div class=\"triad-detail\">\n        <div class=\"td-item\">\n          <div class=\"td-head\"><span class=\"td-glyph\">μ<\u002Fspan><span class=\"td-name\">المتوسط<\u002Fspan><\u002Fdiv>\n          <p class=\"td-desc\">هي القيمة التي تستخرج بجمع درجات المتدربين وقسمتها على عددهم، تخبرك عن مستواهم عموما. عندما يكون المتوسط خارج النطاق المتوقع فهو مؤشر يستوجب المراجعة والكشف عن الأسباب، وعندما يكون داخل النطاق المتوقع فهو مؤشر ممتاز لكنه لا يكفي لتحديد المستوى بدقة، إذ قد تتساوى شعبتان في المتوسط وتتباعد نتائجهم عنه، مما يستوجب النظر في الانحراف المعياري.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"td-item\">\n          <div class=\"td-head\"><span class=\"td-glyph\">σ<\u002Fspan><span class=\"td-name\">الانحراف المعياري<\u002Fspan><\u002Fdiv>\n          <p class=\"td-desc\">يكشف الانحراف المعياري مدى تباعد نتائج المتدربين عن المتوسط أو تقاربها. فإذا كانت قيمته منخفضة تركزت الدرجات حول المتوسط تركزا حادا، وإذا كانت كبيرة تباعدت عنه. وعندما تقع  المتوسط وقيمة الانحراف في النطاق المتوقع فهو مؤشر إيجابي في أغلب الاحيان، لكنه لا يعطي الصورة الكاملة، إذ لا بد من النظر إلى شكل التوزيع.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"td-item\">\n          <div class=\"td-head\"><span class=\"td-glyph\" style=\"font-size: 10px\">▮▮▮<\u002Fspan><span class=\"td-name\">شكل التوزيع<\u002Fspan><\u002Fdiv>\n          <p class=\"td-desc\" style=\"font-weight: 400;\">رسم بياني يوضح توزيع النتائج على التقديرات، وهو المؤشر الذي قد يكشف ما عجز عنه المتوسط والانحراف. فالشكل (ثنائي القمة) يعني انقسام النتائج إلى مجموعتين، متعثرة ومتفوقة، مما يستدعي النظر في كل مجموعة وكشف القاسم المشترك بين أفرادها. والشكل (المسطح) يعني أن النتائج لا تميز بين المستويات. وقد يظهر شكل (مائل إلى القاع) أو (مائل إلى القمة). وأخيرا الشكل (الجرسي) يشير إلى توزع النتائج حول المتوسط توزعا متوازنا.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- القسم 4: أشكال التوزيع -->\n    <section class=\"movement\" data-screen-label=\"القسم ٤ — أشكال التوزيع\">\n      <div class=\"movement-head\">\n        <div class=\"movement-num\">٤<\u002Fdiv>\n        <div class=\"movement-titles\"><h2>أشكال توزيع النتائج ومدلولاتها<\u002Fh2><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"movement-rule\"><\u002Fdiv>\n      <p class=\"movement-intro\">أهم خطوة يراجعها المدرب عند ظهور النتيجة. فالانحراف يكشف تشتت النتائج عن المتوسط لكنه لا يكشف الشكل، وقد تتساوى شعبتان في المتوسط والانحراف ويختلف شكلاهما تماما. تأمل الشكل واقرأ دلالته.<\u002Fp>\n\n      <div class=\"specimens\">\n        <div class=\"specimen specimen-side\">\n          <div class=\"specimen-plate\"><svg viewBox=\"0 0 240 120\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"9.5\" y=\"94.3\" width=\"17.4\" height=\"7.7\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"29.9\" y=\"86.7\" width=\"17.4\" height=\"15.3\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"50.2\" y=\"71.3\" width=\"17.4\" height=\"30.7\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"70.6\" y=\"48.3\" width=\"17.4\" height=\"53.7\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"91.0\" y=\"25.3\" width=\"17.4\" height=\"76.7\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"111.3\" y=\"10.0\" width=\"17.4\" height=\"92.0\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"131.7\" y=\"25.3\" width=\"17.4\" height=\"76.7\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"152.0\" y=\"48.3\" width=\"17.4\" height=\"53.7\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"172.4\" y=\"71.3\" width=\"17.4\" height=\"30.7\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"192.8\" y=\"86.7\" width=\"17.4\" height=\"15.3\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><rect x=\"213.1\" y=\"94.3\" width=\"17.4\" height=\"7.7\" rx=\"1.5\" fill=\"#0e6b66\"><\u002Frect><\u002Fsvg><div class=\"specimen-axis\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"specimen-body\">\n            <div class=\"specimen-name\">جرسي <span class=\"specimen-tag tag-good\">سليم<\u002Fspan><\u002Fdiv>\n            <div class=\"specimen-mean\"><strong>الدلالة:<\u002Fstrong> شعبة متباينة القدرات والنتائج تقيس هذا التباين وتميز بين مستويات المتدربين.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"specimen specimen-side\">\n          <div class=\"specimen-plate\"><svg viewBox=\"0 0 240 120\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"9.5\" y=\"94.9\" width=\"17.4\" height=\"7.1\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"29.9\" y=\"94.9\" width=\"17.4\" height=\"7.1\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"50.2\" y=\"87.8\" width=\"17.4\" height=\"14.2\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"70.6\" y=\"87.8\" width=\"17.4\" height=\"14.2\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"91.0\" y=\"80.8\" width=\"17.4\" height=\"21.2\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"111.3\" y=\"66.6\" width=\"17.4\" height=\"35.4\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"131.7\" y=\"45.4\" width=\"17.4\" height=\"56.6\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"152.0\" y=\"24.2\" width=\"17.4\" height=\"77.8\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"172.4\" y=\"10.0\" width=\"17.4\" height=\"92.0\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"192.8\" y=\"17.1\" width=\"17.4\" height=\"84.9\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><rect x=\"213.1\" y=\"52.5\" width=\"17.4\" height=\"49.5\" rx=\"1.5\" fill=\"#0c5551\"><\u002Frect><\u002Fsvg><div class=\"specimen-axis\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"specimen-body\">\n            <div class=\"specimen-name\">مائل إلى القمة <span class=\"specimen-tag tag-good\">سليم<\u002Fspan><\u002Fdiv>\n            <div class=\"specimen-mean\"><strong>الدلالة:<\u002Fstrong> معظم النتائج تتواجد في التقديرات العليا وقليل في القاع.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"specimen specimen-side\">\n          <div class=\"specimen-plate\"><svg viewBox=\"0 0 240
