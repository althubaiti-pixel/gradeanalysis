 120\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"9.5\" y=\"52.5\" width=\"17.4\" height=\"49.5\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"29.9\" y=\"17.1\" width=\"17.4\" height=\"84.9\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"50.2\" y=\"10.0\" width=\"17.4\" height=\"92.0\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"70.6\" y=\"24.2\" width=\"17.4\" height=\"77.8\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"91.0\" y=\"45.4\" width=\"17.4\" height=\"56.6\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"111.3\" y=\"66.6\" width=\"17.4\" height=\"35.4\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"131.7\" y=\"80.8\" width=\"17.4\" height=\"21.2\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"152.0\" y=\"87.8\" width=\"17.4\" height=\"14.2\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"172.4\" y=\"87.8\" width=\"17.4\" height=\"14.2\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"192.8\" y=\"94.9\" width=\"17.4\" height=\"7.1\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"213.1\" y=\"94.9\" width=\"17.4\" height=\"7.1\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><\u002Fsvg><div class=\"specimen-axis\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"specimen-body\">\n            <div class=\"specimen-name\">مائل إلى القاع <span class=\"specimen-tag tag-warn\">تنبيه<\u002Fspan><\u002Fdiv>\n            <div class=\"specimen-mean\"><strong>الدلالة:<\u002Fstrong> معظم النتائج تتواجد في التقديرات الأدنى وقليل في القمة.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"specimen specimen-side\">\n          <div class=\"specimen-plate\"><svg viewBox=\"0 0 240 120\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"9.5\" y=\"85.3\" width=\"17.4\" height=\"16.7\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"29.9\" y=\"51.8\" width=\"17.4\" height=\"50.2\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"50.2\" y=\"10.0\" width=\"17.4\" height=\"92.0\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"70.6\" y=\"43.5\" width=\"17.4\" height=\"58.5\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"91.0\" y=\"76.9\" width=\"17.4\" height=\"25.1\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"111.3\" y=\"85.3\" width=\"17.4\" height=\"16.7\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"131.7\" y=\"76.9\" width=\"17.4\" height=\"25.1\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"152.0\" y=\"43.5\" width=\"17.4\" height=\"58.5\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"172.4\" y=\"10.0\" width=\"17.4\" height=\"92.0\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"192.8\" y=\"51.8\" width=\"17.4\" height=\"50.2\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><rect x=\"213.1\" y=\"85.3\" width=\"17.4\" height=\"16.7\" rx=\"1.5\" fill=\"#a8463a\"><\u002Frect><\u002Fsvg><div class=\"specimen-axis\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"specimen-body\">\n            <div class=\"specimen-name\">ثنائي القمة <span class=\"specimen-tag tag-warn\">تنبيه<\u002Fspan><\u002Fdiv>\n            <div class=\"specimen-mean\"><strong>الدلالة:<\u002Fstrong> انقسام النتائج إلى قمتين، أحدهما في القمة والأخرى في القاع.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"specimen specimen-side\">\n          <div class=\"specimen-plate\"><svg viewBox=\"0 0 240 120\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"9.5\" y=\"23.1\" width=\"17.4\" height=\"78.9\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"29.9\" y=\"23.1\" width=\"17.4\" height=\"78.9\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"50.2\" y=\"10.0\" width=\"17.4\" height=\"92.0\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"70.6\" y=\"23.1\" width=\"17.4\" height=\"78.9\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"91.0\" y=\"10.0\" width=\"17.4\" height=\"92.0\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"111.3\" y=\"23.1\" width=\"17.4\" height=\"78.9\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"131.7\" y=\"10.0\" width=\"17.4\" height=\"92.0\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"152.0\" y=\"23.1\" width=\"17.4\" height=\"78.9\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"172.4\" y=\"10.0\" width=\"17.4\" height=\"92.0\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"192.8\" y=\"23.1\" width=\"17.4\" height=\"78.9\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><rect x=\"213.1\" y=\"23.1\" width=\"17.4\" height=\"78.9\" rx=\"1.5\" fill=\"#b8862f\"><\u002Frect><\u002Fsvg><div class=\"specimen-axis\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"specimen-body\">\n            <div class=\"specimen-name\">منتظم مسطح <span class=\"specimen-tag tag-warn\">تنبيه<\u002Fspan><\u002Fdiv>\n            <div class=\"specimen-mean\"><strong>الدلالة:<\u002Fstrong> النتائج موزعة على التقديرات ولا تميز بين مستويات المتدربين.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- القسم 5: المختبر التفاعلي -->\n    <section class=\"movement\" data-screen-label=\"القسم ٥ — المختبر التفاعلي\">\n      <div class=\"movement-head\">\n        <div class=\"movement-num\">٥<\u002Fdiv>\n        <div class=\"movement-titles\"><h2>مختبر المؤشرات الثلاثة<\u002Fh2><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"movement-rule\"><\u002Fdiv>\n      <p class=\"movement-intro\">أداة تجريبية مستقلة عن التحليل أعلاه. وزّع ثلاثين متدربا على التقديرات، وراقب كيف يتغير المتوسط والانحراف وشكل التوزيع معا. الغرض تعليمي: فهم العلاقة بين المؤشرات الثلاثة، لا تحليل نتيجة فعلية. القيمتان المعروضتان للمتوسط والانحراف تقديريتان تبينان الاتجاه عند تحريك التوزيع.<\u002Fp>\n\n      <div class=\"lab\">\n        <!-- التقييم التجريبي -->\n        <div class=\"lab-topbar\">\n          <label class=\"lab-flabel\" for=\"labTest\">التقييم التجريبي<\u002Flabel>\n          <select id=\"labTest\">\n            <option value=\"mid_20\">نصفي (من 20)<\u002Foption>\n            <option value=\"fin_40\">نهائي (من 40)<\u002Foption>\n            <option value=\"total100\">الإجمالي (من 100)<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n\n        <!-- الكتلة الرئيسية: الأشرطة يمينا، المخطط يسارا -->\n        <div class=\"lab-main\">\n          <!-- جهة التحكم: توزيعات جاهزة + أشرطة + رصيد -->\n          <div class=\"lab-control-pane\">\n            <!-- التوزيعات الجاهزة فوق الأشرطة -->\n            <div class=\"lab-presets-bar\">\n              <span class=\"lab-presets-label\">توزيعات جاهزة<\u002Fspan>\n              <span class=\"lab-presets\">\n                <button type=\"button\" data-lpreset=\"bell\">جرسي<\u002Fbutton>\n                <button type=\"button\" data-lpreset=\"top\">مائل للقمة<\u002Fbutton>\n                <button type=\"button\" data-lpreset=\"bottom\">مائل للقاع<\u002Fbutton>\n                <button type=\"button\" data-lpreset=\"bimodal\">ثنائي القمة<\u002Fbutton>\n                <button type=\"button\" data-lpreset=\"flat\">منتظم مسطح<\u002Fbutton>\n              <\u002Fspan>\n            <\u002Fdiv>\n\n            <!-- الأشرطة -->\n            <div class=\"lab-sliders\">\n              <div class=\"lab-srow\"><label>ضعيف<\u002Flabel><input type=\"range\" id=\"lrFail\" min=\"0\" max=\"30\" value=\"0\"><span class=\"num lab-sval\" id=\"lvFail\">0<\u002Fspan><\u002Fdiv>\n              <div class=\"lab-srow\"><label>مقبول<\u002Flabel><input type=\"range\" id=\"lrPass\" min=\"0\" max=\"30\" value=\"0\"><span class=\"num lab-sval\" id=\"lvPass\">0<\u002Fspan><\u002Fdiv>\n              <div class=\"lab-srow\"><label>جيد<\u002Flabel><input type=\"range\" id=\"lrGood\" min=\"0\" max=\"30\" value=\"0\"><span class=\"num lab-sval\" id=\"lvGood\">0<\u002Fspan><\u002Fdiv>\n              <div class=\"lab-srow\"><label>جيد جدا<\u002Flabel><input type=\"range\" id=\"lrVgood\" min=\"0\" max=\"30\" value=\"0\"><span class=\"num lab-sval\" id=\"lvVgood\">0<\u002Fspan><\u002Fdiv>\n              <div class=\"lab-srow\"><label>ممتاز<\u002Flabel><input type=\"range\" id=\"lrExcellent\" min=\"0\" max=\"30\" value=\"0\"><span class=\"num lab-sval\" id=\"lvExcellent\">0<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- الرصيد + إعادة التعيين تحت الأشرطة مباشرة -->\n            <div class=\"lab-budget\">\n              <div class=\"lab-budget-main\">\n                <span class=\"lab-budget-label\">المتبقي للتوزيع<\u002Fspan>\n                <span class=\"lab-budget-num\"><span id=\"labRemaining\">٣٠<\u002Fspan><span class=\"lab-budget-of\">من ٣٠<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n              <button type=\"button\" id=\"labReset\" class=\"lab-reset\">إعادة تعيين<\u002Fbutton>\n            <\u002Fdiv>\n            <div class=\"lab-remain-note\" id=\"labRemainNote\">وزّع المتبقي على التقديرات الخمسة.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- جهة العرض: المخطط + المؤشرات -->\n          <div class=\"lab-view-pane\">\n            <div class=\"lab-chart-box\">\n              <canvas id=\"labChart\" width=\"600\" height=\"240\"><\u002Fcanvas>\n            <\u002Fdiv>\n            <div class=\"lab-metrics\">\n              <div class=\"lab-metric\"><span class=\"lab-metric-label\">المتوسط التقديري (μ)<\u002Fspan><span class=\"lab-metric-val num\" id=\"labMean\">—<\u002Fspan><\u002Fdiv>\n              <div class=\"lab-metric\"><span class=\"lab-metric-label\">الانحراف التقديري (σ)<\u002Fspan><span class=\"lab-metric-val num\" id=\"labSd\">—<\u002Fspan><\u002Fdiv>\n              <div class=\"lab-metric lab-metric-shape\"><span class=\"lab-metric-label\">شكل التوزيع<\u002Fspan><span class=\"lab-metric-val\" id=\"labShape\">—<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <p class=\"lab-narrative\" id=\"labNarrative\">حرّك أي شريط وراقب كيف يتغير المتوسط والانحراف والشكل معا.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <footer class=\"footer\">\n      <div class=\"rule\"><\u002Fdiv>\n      <p class=\"org-line\">الكلية التقنية بميسان — المؤسسة العامة للتدريب التقني والمهني<\u002Fp>\n      <p class=\"designer-line\">تصميم الأداة: <span>ريان سعيد الثبيتي<\u002Fspan><\u002Fp>\n      <p>أداة مساندة لتحليل نتائج المقررات.<\u002Fp>\n    <\u002Ffooter>\n\n    <!-- ترويسة التقرير نُقلت لتسبق النتيجة -->\n\n\n  <\u002Fdiv>\n\n<script>\n/* ============ المحلل ============ */\n(function() {\n  const inTest = document.getElementById('inTest');\n  const evalType = document.getElementById('evalType');\n  const testLimit = document.getElementById('testLimit');\n  const testLimitWrap = document.getElementById('testLimitWrap');\n  // خيارات حد الاختبار حسب عنصر التقييم\n  const LIMIT_OPTS = {\n    mid:   [['20', 'من ٢٠'], ['13', 'من ١٣']],\n    final: [['27', 'من ٢٧'], ['40', 'من ٤٠']]\n  };\n  // ربط الاختيارين بمفتاح TESTS الداخلي (يبقي منطق التحليل كما هو)\n  const KEY_MAP = {\n    mid:   { '20': 'mid_20', '13': 'mid_13' },\n    final: { '27': 'fin_theory_27', '40': 'fin_theory_40' }\n  };\n  // الربط العكسي لاستعادة الاختيارين عند التعديل/التصدير\n  const KEY_TO_SEL = {\n    mid_20: ['mid', '20'], mid_13: ['mid', '13'],\n    fin_theory_27: ['final', '27'], fin_theory_40: ['final', '40'],\n    fin_prac_40: ['final', '40'], fin_prac_13: ['final', '27'],\n    total_mixed: ['total', ''], total_theory: ['total', ''], total_prac: ['total', '']\n  };\n  function syncTestKey() {\n    const et = evalType.value;\n    if (et === 'total') { inTest.value = 'total_mixed'; return; }\n    if (et === '' || testLimit.value === '' || !KEY_MAP[et]) { inTest.value = ''; return; }\n    inTest.value = KEY_MAP[et][testLimit.value] || '';\n  }\n  function populateLimits(keepValue) {\n    const et = evalType.value;\n    if (et === 'total') { testLimitWrap.style.display = 'none'; inTest.value = 'total_mixed'; return; }\n    testLimitWrap.style.display = '';\n    if (et === '' || !LIMIT_OPTS[et]) {\n      testLimit.innerHTML = '<option value=\"\" hidden><\u002Foption>';\n      testLimit.value = '';\n      inTest.value = '';\n      return;\n    }\n    const prev = keepValue ? testLimit.value : null;\n    testLimit.innerHTML = '<option value=\"\" hidden><\u002Foption>' +\n      LIMIT_OPTS[et].map(o => '<option value=\"' + o[0] + '\">' + o[1] + '<\u002Foption>').join('');\n    testLimit.value = (prev && LIMIT_OPTS[et].some(o => o[0] === prev)) ? prev : '';\n    syncTestKey();\n  }\n  function currentTestName() {\n    if (evalType.value === 'total') return 'المجموع النهائي (من ١٠٠)';\n    return evalType.options[evalType.selectedIndex].text + ' (' + testLimit.options[testLimit.selectedIndex].text + ')';\n  }\n  const inMean = document.getElementById('inMean');\n  const inSd = document.getElementById('inSd');\n  const gExcellent = document.getElementById('gExcellent');\n  const gVgood = document.getElementById('gVgood');\n  const gGood = document.getElementById('gGood');\n  const gPass = document.getElementById('gPass');\n  const gFail = document.getElementById('gFail');\n  const distChart = document.getElementById('distChart');\n  const meanHint = document.getElementById('meanHint');\n  const result = document.getElementById('result');\n  const cardPrompts = document.querySelectorAll('.card-prompt');\n  function setPrompt(msg) { cardPrompts.forEach(e => e.textContent = msg); }\n  // تفريغ عناصر العرض إلى حالة محايدة عند عدم اكتمال البيانات\n  function clearResultCards() {\n    meanValDisp.textContent = '—'; meanExpected.textContent = '—';\n    sdValDisp.textContent = '—'; sdExpected.textContent = '—';\n    verdictText.textContent = '—';\n    verdictBanner.style.background = '';\n    setTag(meanTag, '—', ''); setTag(sdTag, '—', ''); setTag(shapeTag, '—', '');\n    [...gradeStrip.querySelectorAll('.gs-seg'), ...sdStrip.querySelectorAll('.gs-seg')].forEach(seg => {\n      seg.classList.remove('active'); seg.style.background = ''; seg.style.color = '';\n    });\n  }\n  const verdictBanner = document.getElementById('verdictBanner');\n  const verdictText = document.getElementById('verdictText');\n  const gradeStrip = document.getElementById('gradeStrip');\n  const meanTag = document.getElementById('meanTag');\n  const meanBody = document.getElementById('meanBody');\n  const meanValDisp = document.getElementById('meanValDisp');\n  const meanExpected = document.getElementById('meanExpected');\n  const toAr = s => String(s).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);\n  const sdValDisp = document.getElementById('sdValDisp');\n  const sdExpected = document.getElementById('sdExpected');\n  const sdTag = document.getElementById('sdTag');\n  const sdStrip = document.getElementById('sdStrip');\n  const sdBody = document.getElementById('sdBody');\n  const shapeTag = document.getElementById('shapeTag');\n  const shapeBody = document.getElementById('shapeBody');\n  const summaryBody = document.getElementById('summaryBody');\n  const recommendBox = document.getElementById('recommendBox');\n\n  const COLORS = { good:'#2d7d6f', warn:'#b8862f', bad:'#a8463a', tight:'#4a7d8c' };\n\n  let lastResult = null;\n\n  // كل اختبار: الدرجة العظمى، طبيعته (نظري/عملي/وسطي تحدد النطاق)، وحدود التقدير\n  const TESTS = {\n    mid_20:        { max:20,  kind:'theory',  tiers:{ مقبول:10, جيد:13, 'جيد جدا':15, ممتاز:18 } },\n    mid_13:        { max:13,  kind:'theory',  tiers:{ مقبول:6,  جيد:8,  'جيد جدا':10, ممتاز:12 } },\n    fin_theory_40: { max:40,  kind:'theory',  tiers:{ مقبول:20, جيد:25, 'جيد جدا':30, ممتاز:35 } },\n    fin_theory_27: { max:27,  kind:'theory',  tiers:{ مقبول:14, جيد:17, 'جيد جدا':20, ممتاز:24 } },\n    fin_prac_40:   { max:40,  kind:'prac',    tiers:{ مقبول:20, جيد:25, 'جيد جدا':30, ممتاز:35 } },\n    fin_prac_13:   { max:13,  kind:'prac',    tiers:{ مقبول:6,  جيد:8,  'جيد جدا':10, ممتاز:12 } },\n    total_theory:  { max:100, kind:'theory', tiers:{ مقبول:60, جيد:70, 'جيد جدا':80, ممتاز:90 } },\n    total_prac:    { max:100, kind:'prac',   tiers:{ مقبول:60, جيد:70, 'جيد جدا':80, ممتاز:90 } },\n    total_mixed:   { max:100, kind:'mixed',  tiers:{ مقبول:60, جيد:70, 'جيد جدا':80, ممتاز:90 } }\n  };\n\n  // النطاقات المتوقعة للانحراف على مقياس 100\n  const SD_RANGES = {\n    theory: { lo:10, hi:15, label:'نظري' },\n    prac:   { lo:5,  hi:10, label:'عملي' },\n    mixed:  { lo:8,  hi:13, label:'نظري/عملي' }\n  };\n\n  /* ===== أشرطة التقديرات + جدول النطاقات + عدد المتدربين ===== */\n  const GA_LABELS = ['ضعيف','مقبول','جيد','جيد جدا','ممتاز'];\n  const gaTotal = document.getElementById('gaTotal');\n  const gaBudget = document.getElementById('gaBudget');\n  const gaRanges = document.getElementById('gaRanges');\n  const gaSliders = {\n    ضعيف: document.getElementById('raFail'),\n    مقبول: document.getElementById('raPass'),\n    جيد: document.getElementById('raGood'),\n    'جيد جدا': document.getElementById('raVgood'),\n    ممتاز: document.getElementById('raExcellent')\n  };\n  const gaVals = {\n    ضعيف: document.getElementById('vaFail'),\n    مقبول: document.getElementById('vaPass'),\n    جيد: document.getElementById('vaGood'),\n    'جيد جدا': document.getElementById('vaVgood'),\n    ممتاز: document.getElementById('vaExcellent')\n  };\n  const gaHidden = {\n    ضعيف: document.getElementById('gFail'),\n    مقبول: document.getElementById('gPass'),\n    جيد: document.getElementById('gGood'),\n    'جيد جدا': document.getElementById('gVgood'),\n    ممتاز: document.getElementById('gExcellent')\n  };\n  const DOT_CLASS = { ضعيف:'dot-fail', مقبول:'dot-pass', جيد:'dot-good', 'جيد جدا':'dot-vgood', ممتاز:'dot-excellent' };\n\n  // جدول نطاقات التقديرات حسب الاختبار المختار\n  function buildRangesTable() {\n    const t = TESTS[inTest.value];\n    if (!t) { gaRanges.innerHTML = ''; return; }\n    const ti = t.tiers, mx = t.max;\n    // الحدود: ضعيف 0..مقبول-1، مقبول..جيد-1، جيد..جيدجدا-1، جيدجدا..ممتاز-1، ممتاز..max\n    const ranges = {\n      ضعيف:     [0, ti['مقبول'] - 1],\n      مقبول:    [ti['مقبول'], ti['جيد'] - 1],\n      جيد:      [ti['جيد'], ti['جيد جدا'] - 1],\n      'جيد جدا':[ti['جيد جدا'], ti['ممتاز'] - 1],\n      ممتاز:    [ti['ممتاز'], mx]\n    };\n    let html = '';\n    ['ممتاز','جيد جدا','جيد','مقبول','ضعيف'].forEach(name => {\n      const [lo, hi] = ranges[name];\n      html += '<tr><td class=\"gar-name\"><span class=\"dot ' + DOT_CLASS[name] + '\"><\u002Fspan>' + name + '<\u002Ftd>'\n        + '<td class=\"gar-range\">' + toAr(lo) + ' – ' + toAr(hi) + '<\u002Ftd><\u002Ftr>';\n    });\n    gaRanges.innerHTML = html;\n  }\n\n  // إدارة الميزانية: مجموع الأشرطة = عدد المتدربين\n  function enforceGaBudget(changedKey) {\n    const total = parseInt(gaTotal.value) || 0;\n    if (total <= 0) {\n      GA_LABELS.forEach(l => { gaSliders[l].disabled = true; gaSliders[l].max = 0; });\n      gaBudget.textContent = '';\n      gaBudget.classList.remove('full');\n      return;\n    }\n    GA_LABELS.forEach(l => gaSliders[l].disabled = false);\n    if (changedKey) {\n      let others = 0;\n      GA_LABELS.forEach(l => { if (l !== changedKey) others += parseInt(gaSliders[l].value) || 0; });\n      const allowed = total - others;\n      let v = parseInt(gaSliders[changedKey].value) || 0;\n      if (v > allowed) { v = allowed; gaSliders[changedKey].value = v; }\n    }\n    let used = 0;\n    GA_LABELS.forEach(l => used += parseInt(gaSliders[l].value) || 0);\n    const remain = total - used;\n    GA_LABELS.forEach(l => { const cur = parseInt(gaSliders[l].value) || 0; gaSliders[l].max = cur + remain; });\n    gaBudget.textContent = 'المتبقي: ' + toAr(remain) + ' من ' + toAr(total);\n    gaBudget.classList.toggle('full', remain === 0);\n  }\n\n  // مزامنة قيم الأشرطة → الحقول المخفية + العرض\n  function syncGaToHidden() {\n    GA_LABELS.forEach(l => {\n      const v = parseInt(gaSliders[l].value) || 0;\n      gaVals[l].textContent = toAr(v);\n      gaHidden[l].value = v;\n    });\n  }\n\n  function resetGaSliders() {\n    GA_LABELS.forEach(l => { gaSliders[l].max = parseInt(gaTotal.value) || 0; gaSliders[l].value = 0; });\n    syncGaToHidden();\n    enforceGaBudget();\n  }\n\n  function onGaSlider(key) {\n    enforceGaBudget(key);\n    syncGaToHidden();\n    analyze();\n  }\n\n  gaTotal.addEventListener('input', () => { resetGaSliders(); analyze(); });\n  GA_LABELS.forEach(l => gaSliders[l].addEventListener('input', () => onGaSlider(l)));\n\n  function tierOf(score, tiers) {\n    if (score >= tiers['ممتاز']) return 'ممتاز';\n    if (score >= tiers['جيد جدا']) return 'جيد جدا';\n    if (score >= tiers['جيد']) return 'جيد';\n    if (score >= tiers['مقبول']) return 'مقبول';\n    return 'ضعيف';\n  }\n\n  function updateHint() {\n    const t = TESTS[inTest.value];\n    if (!t) { meanHint.textContent = 'متوسط درجات المتدربين'; inMean.removeAttribute('max'); return; }\n    meanHint.textContent = 'متوسط درجات المتدربين من ' + t.max;\n    inMean.max = t.max;\n  }\n\n  // رسم مخطط التقديرات واكتشاف شكله\n  function getGradeCounts() {\n    return {\n      ضعيف: parseInt(gFail.value) || 0,\n      مقبول: parseInt(gPass.value) || 0,\n      جيد: parseInt(gGood.value) || 0,\n      'جيد جدا': parseInt(gVgood.value) || 0,\n      ممتاز: parseInt(gExcellent.value) || 0\n    };\n  }\n\n  function detectShape(arr) {\n    // arr بترتيب: ضعيف، مقبول، جيد، جيد جدا، ممتاز (مؤشر 0..4)\n    const total = arr.reduce((a,b)=>a+b,0);\n    if (total === 0) return 'لم تدخل أعداد التقديرات بعد';\n    const n = arr.length, mx = Math.max(...arr), mid = (n-1)/2;\n\n    // القمم المحلية (الأعمدة المتساوية المتلاصقة هضبة = قمة واحدة)\n    const peaks = [];\n    let i = 0;\n    while (i < n) {\n      if (arr[i] === 0) { i++; continue; }\n      let j = i;\n      while (j+1 < n && arr[j+1] === arr[i]) j++;\n      const L = i > 0 ? arr[i-1] : -1;\n      const R = j+1 < n ? arr[j+1] : -1;\n      if (arr[i] >= L && arr[i] >= R && arr[i] >= mx*0.5) {\n        peaks.push({ start:i, end:j, val:arr[i] });\n      }\n      i = j + 1;\n    }\n\n    // عمق الوادي بين قمتين (Infinity إن كانتا متجاورتين)\n    function deepValley(a, b) {\n      if (b.start <= a.end + 1) return Infinity;\n      return Math.min(...arr.slice(a.end+1, b.start));\n    }\n    // عدد القمم المفصولة بوادٍ عميق\n    let sep = peaks.length > 0 ? 1 : 0;\n    for (let k=0; k<peaks.length-1; k++) {\n      if (deepValley(peaks[k], peaks[k+1]) <= Math.min(peaks[k].val, peaks[k+1].val) * 0.6) sep++;\n    }\n\n    let massCenter = 0;\n    for (let k=0; k<n; k++) massCenter += k*arr[k];\n    massCenter /= total;\n    const nonZero = arr.filter(v => v > 0);\n\n    // 1) ثنائي القمة: قمتان متعادلتان مفصولتان بوادٍ عميق، تهيمنان على الكتلة\n    if (peaks.length >= 2) {\n      for (let x=0; x<peaks.length; x++) {\n        for (let y=x+1; y<peaks.length; y++) {\n          const a = peaks[x], b = peaks[y], top = Math.max(a.val, b.val);\n          if (a.val < total*0.25 || b.val < total*0.25) continue;\n          if (a.val < top*0.40 || b.val < top*0.40) continue;\n          // تعادل القمتين: الأدنى ≥70% من الأعلى (لا ذروة عالية + كتف أوطأ)\n          if (Math.min(a.val, b.val) < top*0.70) continue;\n          if (deepValley(a, b) > Math.min(a.val, b.val) * 0.6) continue;\n          if (a.val + b.val < total * 0.55) continue;\n          if (Math.abs(massCenter - mid) > 0.60) continue;\n          // الزوج يجب أن يكون أعلى قمتين (لا قمة أخرى أعلى من أدناهما)\n          let higherElsewhere = false;\n          for (const p of peaks) { if (p===a||p===b) continue; if (p.val > Math.min(a.val,b.val)) { higherElsewhere=true; break; } }\n          if (higherElsewhere) continue;\n          // قمة بينهما تتجاوز نصف الأعلى تكسر الثنائية (ذروة مركزية)\n          let centralBreaker = false;\n          for (const p of peaks) { if (p===a||p===b) continue; if (p.start>a.end && p.end<b.start && p.val > top*0.5) { centralBreaker=true; break; } }\n          if (centralBreaker) continue;\n          // قمة كبيرة خارج المجال بينهما\n          let outsideBig = false;\n          for (const p of peaks) { if (p===a||p===b) continue; const between=p.start>a.end&&p.end<b.start; if (!between && p.val > top*0.5) { outsideBig=true; break; } }\n          if (outsideBig) continue;\n          return 'ثنائي القمة';\n        }\n      }\n    }\n\n    // 2) متعدد القمم: ثلاث قمم مفصولة فأكثر بالارتفاع الأقصى متكرر = مسطح\n    if (sep >= 3) {\n      const maxPeaks = peaks.filter(p => p.val === mx);\n      if (maxPeaks.length >= 2) return 'منتظم مسطح';\n    }\n\n    // 3) متعدد القمم بقمة قصوى وحيدة غير مركزية = مسطح\n    if (sep >= 3) {\n      const maxPeak = peaks.find(p => p.val === mx);\n      const central = maxPeak.start > 0 && maxPeak.end < n-1;\n      if (!central) return 'منتظم مسطح';\n    }\n\n    // 4) منتظم مسطح صريح: فئات منبسطة، كتلة وسطية، بلا ذروة وحيدة بارزة\n    const minNZ = Math.min(...nonZero);\n    const massCentral = Math.abs(massCenter - mid) <= 0.5;\n    const singlePeak = (peaks.length === 1 && (peaks[0].end - peaks[0].start + 1) < nonZero.length);\n    if (nonZero.length >= 4 && minNZ >= mx*0.5 && massCentral && !singlePeak) {\n      return 'منتظم مسطح';\n    }\n\n    // 5) تعارض الذروة مع مركز الكتلة على فئات منبسطة = مسطح\n    const peakPos = [];\n    for (let k=0; k<n; k++) if (arr[k] === mx) peakPos.push(k);\n    const peakCenter = peakPos.reduce((a,b)=>a+b,0) / peakPos.length;\n    const pSide = peakCenter > mid ? 1 : (peakCenter < mid ? -1 : 0);\n    const mSide = massCenter > mid+0.05 ? 1 : (massCenter < mid-0.05 ? -1 : 0);\n    if (pSide !== 0 && mSide !== 0 && pSide !== mSide && nonZero.length >= 4) {\n      return 'منتظم مسطح';\n    }\n\n    // 6) أحادي القمة: الذروة + مركز الكتلة\n    const peakUp = peakCenter > mid+0.5, peakDn = peakCenter < mid-0.5;\n    const massUp = massCenter > mid+0.4, massDn = massCenter < mid-0.4;\n    if ((peakUp || massUp) && !(peakDn || massDn)) return 'مائل إلى القمة';\n    if ((peakDn || massDn) && !(peakUp || massUp)) return 'مائل إلى القاع';\n    return 'جرسي';\n  }\n\n  function drawDist(counts) {\n    const labels = ['ضعيف','مقبول','جيد','جيد جدا','ممتاز'];\n    const arr = labels.map(l=>counts[l]);\n    const ctx = distChart.getContext('2d');\n    const dpr = window.devicePixelRatio || 1;\n    const W=600,H=250;\n    distChart.width=W*dpr; distChart.height=H*dpr;\n    distChart.style.width='100%'; distChart.style.maxWidth=W+'px';\n    ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);\n    ctx.clearRect(0,0,W,H);\n\n    const pad={l:16,r:16,t:32,b:34}, pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;\n    const mx=Math.max(...arr,1);\n    const n=arr.length, slot=pw/n;\n    const bw=Math.min(slot*0.42, 50);   // عرض العمود: أنحف وأكثر تناسقا\n    // ألوان التقديرات: ضعيف أحمر، متدرج صعودا للأخضر\n    const colors=['#a8463a','#b8862f','#4a7d8c','#3a8a85','#0e6b66'];\n    const base=pad.t+ph;\n\n    // خط الأساس\n    ctx.strokeStyle='#dce6e6'; ctx.lineWidth=1;\n    ctx.beginPath(); ctx.moveTo(pad.l,base); ctx.lineTo(pad.l+pw,base); ctx.stroke();\n\n    // الأعمدة: ضعيف(0) يسارا، ممتاز(4) يمينا. الكانفس ltr، فأكبر x يمين.\n    arr.forEach((v,i)=>{\n      const cx = pad.l + i*slot + slot/2;        // مركز الخانة\n      const x = cx - bw/2;\n      const h = v>0 ? Math.max(4, (v/mx)*ph) : 0; // قاعدة صغيرة مرئية للقيم غير الصفرية\n      const y = base - h;\n      if (h > 0) {\n        const r = Math.min(6, bw/2, h);\n        ctx.fillStyle=colors[i];\n        ctx.beginPath();\n        ctx.moveTo(x, base);\n        ctx.lineTo(x, y+r);\n        ctx.quadraticCurveTo(x, y, x+r, y);\n        ctx.lineTo(x+bw-r, y);\n        ctx.quadraticCurveTo(x+bw, y, x+bw, y+r);\n        ctx.lineTo(x+bw, base);\n        ctx.closePath(); ctx.fill();\n      }\n      // العدد فوق العمود\n      ctx.fillStyle='#16302e'; ctx.font='700 13px Cairo, sans-serif'; ctx.textAlign='center';\n      ctx.fillText(toAr(v), cx, (v>0 ? y : base) - 8);\n      // اسم التقدير أسفل\n      ctx.fillStyle='#3f5a58'; ctx.font='12px Cairo, sans-serif';\n      ctx.fillText(labels[i], cx, base+18);\n    });\n  }\n\n  // ألوان الوسوم\n  function setTag(el, text, cls) {\n    el.textContent = text;\n    el.className = 'rc-tag ' + cls;\n  }\n\n  function analyze() {\n    const t = TESTS[inTest.value];\n    const mean = parseFloat(inMean.value);\n    const sd = parseFloat(inSd.value);\n    const counts = getGradeCounts();\n    const gradesArr = ['ضعيف','مقبول','جيد','جيد جدا','ممتاز'].map(l=>counts[l]);\n    const gradesTotal = gradesArr.reduce((a,b)=>a+b,0);\n\n    if (!t || isNaN(mean) || isNaN(sd) || mean <= 0 || gradesTotal === 0) {\n      setPrompt('أكمل البيانات لتظهر نتائج التحليل');\n      clearResultCards();\n      result.classList.add('is-empty');\n      return;\n    }\n    if (mean > t.max) {\n      setPrompt('المتوسط (' + mean + ') أكبر من الدرجة العظمى للاختبار (' + t.max + '). تحقق من الإدخال.');\n      clearResultCards();\n      result.classList.add('is-empty');\n      return;\n    }\n    result.classList.remove('is-empty');\n\n    // حسابات أساسية\n    const sdPct = (sd / t.max) * 100;\n    const r = SD_RANGES[t.kind];\n    const tier = tierOf(mean, t.tiers);\n    const shape = detectShape(gradesArr);\n\n    // حدا النطاق المتوقع للمتوسط مشتقان من الحدود مباشرة:\n    // يبدأ عند حد «جيد» وينتهي عند ما دون حد «ممتاز»، فيغطي تقديري «جيد» و«جيد جدا»\n    const meanLoCut = t.tiers['جيد'];      // بداية النطاق\n    const meanHiCut = t.tiers['ممتاز'];     // أول درجة فوق النطاق\n    const meanLoDisp = meanLoCut;\n    const meanHiDisp = meanHiCut - 1;      // أعلى درجة لا تزال ضمن النطاق\n\n    // === حاوية المتوسط ===\n    const lowTiers = ['ضعيف','مقبول'];\n    const tierColor = lowTiers.includes(tier) ? COLORS.warn : COLORS.good;\n    [...gradeStrip.querySelectorAll('.gs-seg')].forEach(seg => {\n      const on = seg.dataset.tier === tier;\n      seg.classList.toggle('active', on);\n      seg.style.background = on ? tierColor : '';\n      seg.style.color = on ? '#fff' : '';\n    });\n    meanValDisp.textContent = toAr(mean);\n    meanExpected.textContent = toAr(meanLoDisp) + ' – ' + toAr(meanHiDisp);\n    const meanHigh = mean >= meanHiCut;    // بلغ حد «ممتاز» فأعلى\n    const meanLow  = mean < meanLoCut;     // دون حد «جيد»\n    if (meanHigh) {\n      setTag(meanTag, 'مرتفع عن النطاق', 'tag-bad');\n      meanBody.textContent = 'متوسط الشعبة ' + mean + ' من ' + t.max + '، وهو أعلى من النطاق المتوقع لمتوسط الشعبة (' + meanLoDisp + ' إلى ' + meanHiDisp + '). يقع متوسط الشعبة في فئة «' + tier + '».';\n    } else if (meanLow) {\n      setTag(meanTag, 'منخفض عن النطاق', 'tag-bad');\n      meanBody.textContent = 'متوسط الشعبة ' + mean + ' من ' + t.max + '، وهو أقل من النطاق المتوقع لمتوسط الشعبة (' + meanLoDisp + ' إلى ' + meanHiDisp + '). يقع متوسط الشعبة في فئة «' + tier + '».';\n    } else {\n      setTag(meanTag, 'ضمن النطاق', 'tag-good');\n      meanBody.textContent = 'متوسط الشعبة ' + mean + ' من ' + t.max + '، وهو ضمن النطاق المتوقع لمتوسط الشعبة (' + meanLoDisp + ' إلى ' + meanHiDisp + '). يقع متوسط الشعبة في فئة «' + tier + '».';\n    }\n\n    // === حاوية الانحراف ===\n    // النطاق المقبول بوحدات هذا الاختبار\n    const sdLoUnit = (r.lo/100*t.max);\n    const sdHiUnit = (r.hi/100*t.max);\n    const fmt = x => (Math.round(x*10)/10).toString().replace(/\\.0$/,'');\n    sdValDisp.textContent = toAr(Math.round(sd));\n    sdExpected.textContent = toAr(fmt(sdLoUnit)) + ' – ' + toAr(fmt(sdHiUnit));\n    let sdState, sdCls;\n    if (sdPct < r.lo - 2) {\n      sdState='منخفض'; sdCls='tag-tight';\n      sdBody.textContent='نتائج المتدربين متقاربة جدا، أقل من النطاق المقبول لعناصر التقييم (' + fmt(sdLoUnit) + ' إلى ' + fmt(sdHiUnit) + '). يعني ذلك أن عناصر التقييم لم تميز بين مستويات المتدربين، فلا يكاد يفصل المتفوق من المتعثر.';\n    } else if (sdPct <= r.hi) {\n      sdState='سليم'; sdCls='tag-good';\n      sdBody.textContent='نتائج المتدربين متباعدة تباعدا متوازنا، ضمن النطاق المقبول لعناصر التقييم (' + fmt(sdLoUnit) + ' إلى ' + fmt(sdHiUnit) + '). يعني ذلك أن عناصر التقييم تميز بين المستويات والمتوسط ذو معنى.';\n    } else if (sdPct <= r.hi + 5) {\n      sdState='أوسع من المثالي'; sdCls='tag-warn';\n      sdBody.textContent='نتائج المتدربين أوسع تباعدا من المعتاد، أعلى قليلا من النطاق المقبول لعناصر التقييم (' + fmt(sdLoUnit) + ' إلى ' + fmt(sdHiUnit) + '). انظر شكل التوزيع لمعرفة سبب هذا الاتساع.';\n    } else {\n      sdState='مرتفع'; sdCls='tag-bad';\n      sdBody.textContent='نتائج المتدربين شديدة التباعد، أعلى بفارق واضح من النطاق المقبول لعناصر التقييم (' + fmt(sdLoUnit) + ' إلى ' + fmt(sdHiUnit) + '). يعني ذلك غالبا انقسام الشعبة إلى مستويين أو خللا في بعض عناصر التقييم.';\n    }\n    // الوسم والشريط: حالة الانحراف\n    const sdColorMap = { 'tag-good':'#2d7d6f', 'tag-warn':'#b8862f', 'tag-bad':'#a8463a', 'tag-tight':'#4a7d8c' };\n    const sdInRange = (sdState === 'سليم');\n    setTag(sdTag, sdInRange ? 'ضمن النطاق' : 'خارج النطاق', sdInRange ? 'tag-good' : sdCls);\n    [...sdStrip.querySelectorAll('.gs-seg')].forEach(seg => {\n      const on = seg.dataset.sdstate === sdState;\n      seg.classList.toggle('active', on);\n      seg.style.background = on ? sdColorMap[sdCls] : '';\n      seg.style.color = on ? '#fff' : '';\n    });\n\n\n    // === حاوية الشكل ===\n    drawDist(counts);\n    setTag(shapeTag, shape, 'tag-good');\n\n    // نص الشكل ودلالته\n    let shapeText, shapeSummary, shapeRec, shapeCls='tag-good';\n    if (shape === 'جرسي') {\n      shapeText='توزيع الدرجات جرسي، تتجمع النتائج حول المتوسط وتتدرج نحو الطرفين.';\n      shapeSummary='توزيع النتائج جرسي متماثل، والمتوسط في نطاقه الطبيعي. هذا هو الوضع المثالي، إذ تميز النتائج بين مستويات المتدربين، وتتدرج حول المتوسط بصورة متوازنة.';\n      shapeRec='الوضع سليم. اتخذ هذه النتيجة خط أساس تقارن عليه الفصول التدريبية القادمة لنفس الاختبار.';\n      shapeCls='tag-good';\n    } else if (shape === 'مائل إلى القمة') {\n      shapeText='توزيع النتائج مائل إلى القمة، معظم النتائج في التقديرات العليا.';\n      shapeSummary='توزيع النتائج مائل إلى القمة، أي أن معظمها في التقديرات العليا وقليل في القاع. هذا مؤشر إيجابي، لكنه يستحق الانتباه إلى الفئة المتعثرة القليلة.';\n      shapeRec='راجع المتدربين المتعثرين فرديا وتحقق من سبب تخلفهم عن بقية المتدربين.';\n      shapeCls='tag-good';\n    } else if (shape === 'مائل إلى القاع') {\n      shapeText='توزيع النتائج مائل إلى القاع، معظم النتائج في التقديرات الدنيا.';\n      shapeSummary='توزيع النتائج مائل إلى القاع، أي أن معظمها في التقديرات الأدنى وقليل في القمة. ورغم أن الانحراف قد يبدو ضمن النطاق، فإن هذا الميل يكشف أن الدرجات تتجمع قرب حد النجاح لا حول منتصف سليم. هذا تنبيه يستحق المراجعة.';\n      shapeRec='راجع صعوبة عناصر التقييم وتحقق من وضوحها ومدى تغطيتها لما تم تدريبه.';\n      shapeCls='tag-warn';\n    } else if (shape === 'ثنائي القمة') {\n      shapeText='توزيع النتائج ثنائي القمة، كتلتان متمايزتان في طرفي التوزيع.';\n      shapeSummary='توزيع النتائج ثنائي القمة، أي أن النتائج منقسمة إلى مجموعتين، أحدهما متعثرة والأخرى متفوقة.';\n      shapeRec='حدد القاسم المشترك داخل أفراد كل مجموعة، وعالج الأسباب التي جعلت المجموعة الأدنى تتعثر.';\n      shapeCls='tag-warn';\n    } else { // منتظم مسطح\n      shapeText='توزيع النتائج منتظم مسطح، أعداد المتدربين متقاربة عبر التقديرات.';\n      shapeSummary='توزيع النتائج منتظم مسطح، أي أن أعداد المتدربين متقاربة عبر كل التقديرات دون قمة واضحة. يدل ذلك على أن الاختبار لم يميز بين مستويات المتدربين.';\n      shapeRec='راجع عناصر التقييم وتأكد من خلوها من الغموض أو من قابلية الحل بالتخمين.';\n      shapeCls='tag-warn';\n    }\n    setTag(shapeTag, shape, shapeCls);\n    shapeBody.textContent = shapeText;\n\n    // === البوابة: الحكم النهائي ===\n    let verdict, vColor, summary, rec;\n    if (meanHigh) {\n      verdict='خلل في النتائج: المتوسط مرتفع';\n      vColor=COLORS.bad;\n      summary='يدل ارتفاع المتوسط على هذا النحو غالبا على أن الاختبار أو عناصر التقييم كانت سهلة، فحصل أغلب المتدربين على درجات عالية متقاربة دون أن يميز الاختبار بين مستوياتهم. وما دام الاختبار نفسه لم يميز، فإن قراءة الانحراف والشكل تأتيان في المرتبة الثانية.';\n      rec='راجع عناصر التقييم من حيث سهولتها وذلك لكشف الفروق بين المتدربين ولكي ينعكس لك مستوى المتدربين الحقيقي.';\n    } else if (meanLow) {\n      verdict='خلل في النتائج: المتوسط منخفض';\n      vColor=COLORS.bad;\n      summary='يدل انخفاض المتوسط على هذا النحو غالبا على أن الاختبار أو عناصر التقييم كانت أصعب مما ينبغي، أو أن جزءا من المحتوى لم يدرس كما ينبغي. وما دام الاختبار نفسه مختلا، فإن قراءة الانحراف والشكل تأتيان في المرتبة الثانية.';\n      rec='راجع صعوبة عناصر التقييم، وتحقق من وضوحها ومدى تغطيتها لما تم تدريبه.';\n    } else {\n      // المتوسط طبيعي: نربط الشكل بالانحراف للخروج بحكم واحد\n      summary = shapeSummary;\n      rec = shapeRec;\n\n      const sdTight = (sdState === 'منخفض');\n      const sdWide  = (sdState === 'أوسع من المثالي' || sdState === 'مرتفع');\n\n      if (shape === 'جرسي' || shape === 'مائل إلى القمة') {\n        // الوضع سليم في الأصل، لكن الانحراف قد يقلبه إلى تنبيه أو يضيف ملاحظة\n        if (sdTight) {\n          // انحراف صغير في توزيع سليم: عيب حقيقي، الاختبار لم يميز\n          verdict = 'تنبيه: تباعد ضيق';\n          vColor = COLORS.warn;\n          summary = (shape === 'جرسي'\n            ? 'توزيع الدرجات جرسي متماثل والمتوسط في نطاقه الطبيعي، غير أن درجات المتدربين شديدة التقارب.'\n            : 'توزيع الدرجات مائل إلى القمة، غير أن درجات المتدربين شديدة التقارب.')\n            + ' هذا التقارب الحاد يكشف أن الاختبار لم يميز بين مستويات المتدربين تمييزا كافيا، فلم يفصل المتفوق من المتعثر.';\n          rec = 'راجع أسئلة الاختبار وأضف ما يكشف الفروق بين المتدربين، فالشكل سليم لكن تقارب الدرجات يحد من قدرة الاختبار على التمييز.';\n        } else {\n          verdict = 'الوضع سليم: ' + shape;\n          vColor = COLORS.good;\n          if (sdWide) {\n            summary += ' غير أن تباعد الدرجات أوسع من المثالي، فبعض المتدربين بعيدون عن المتوسط في الطرفين.';\n          }\n        }\n      } else {\n        // مائل للقاع أو ثنائي أو منتظم: تنبيه. والانحراف يثري النص لا يقلبه\n        verdict = 'تنبيه: ' + shape;\n        vColor = COLORS.warn;\n        if (sdTight) {\n          summary += ' كما أن درجات المتدربين شديدة التقارب، مما يضعف قدرة الاختبار على التمييز بينهم.';\n        } else if (sdWide) {\n          summary += ' ويرافق ذلك تباعد واسع في الدرجات يؤكد هذا الانقسام.';\n        }\n      }\n    }\n\n    verdictBanner.style.background = vColor;\n    verdictText.textContent = verdict;\n    summaryBody.textContent = summary;\n    recommendBox.innerHTML = '<strong>التوصية:<\u002Fstrong> ' + rec;\n\n    // تخزين النتيجة لتصدير PDF\n    lastResult = {\n      testName: currentTestName(),\n      max: t.max,\n      mean, sd, gradesArr, tier, shape,\n      verdict, vColor, summary, rec\n    };\n  }\n\n  function onEvalChange() { populateLimits(false); updateHint(); buildRangesTable(); analyze(); updateButtons(); }\n  function onLimitChange() { syncTestKey(); updateHint(); buildRangesTable(); analyze(); updateButtons(); }\n  evalType.addEventListener('change', onEvalChange);\n  testLimit.addEventListener('change', onLimitChange);\n  [inMean, inSd].forEach(el => { el.addEventListener('input', analyze); el.addEventListener('change', analyze); });\n  populateLimits(false);\n  updateHint();\n  buildRangesTable();\n  enforceGaBudget();\n\n  // ===== مراجع البيانات =====\n  const metaOrg = document.getElementById('metaOrg');\n  const metaTrainer = document.getElementById('metaTrainer');\n  const metaCourse = document.getElementById('metaCourse');\n  const metaSection = document.getElementById('metaSection');\n  const metaDept = document.getElementById('metaDept');\n\n  function buildPrintSheet() {\n    if (!lastResult) {\n      alert('أدخل بيانات الاختبار أولا لعرض النتيجة قبل التصدير.');\n      return false;\n    }\n    const R = lastResult;\n\n    // اسم الكلية في الكليشة (ثابت)، ثم القسم تحته\n    const org = metaOrg.value.trim();\n    document.getElementById('phOrg').textContent = org;\n    document.getElementById('phOrgBlock').style.display = org ? 'block' : 'none';\n    const dept = metaDept.value.trim();\n    const phDept = document.getElementById('phDept');\n    phDept.textContent = dept;\n    phDept.style.display = dept ? 'block' : 'none';\n\n    // تاريخ التقرير هجريا من تقويم أم القرى المعتمد\n    const now = new Date();\n    const hp = new Intl.DateTimeFormat('en-US-u-ca-islamic-umalqura',\n      { year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(now);\n    const hg = t => (hp.find(p => p.type === t) || {}).value || '';\n    const dateStr = toAr(hg('year') + '/' + hg('month') + '/' + hg('day')) + ' هـ';\n    let ctxHtml = '';\n    if (metaTrainer.value.trim()) ctxHtml += ctxRow('المدرب', metaTrainer.value.trim());\n    if (metaCourse.value.trim()) ctxHtml += ctxRow('المقرر', metaCourse.value.trim());\n    if (metaSection.value.trim()) ctxHtml += ctxRow('الشعبة', metaSection.value.trim());\n    ctxHtml += ctxRow('التقييم', R.testName);\n    ctxHtml += ctxRow('تاريخ التقرير', dateStr);\n    document.getElementById('phContext').innerHTML = ctxHtml;\n\n    return true;\n\n    function ctxRow(k, v) { return '<tr><td>' + k + ':<\u002Ftd><td>' + escapeHtml(String(v)) + '<\u002Ftd><\u002Ftr>'; }\n  }\n\n  function escapeHtml(s) {\n    return s.replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));\n  }\n\n  // ===== حفظ PDF =====\n  // يلتقط ترويسة التقرير والنتيجة صورةً ثم يلفّها في ملف PDF قابل للتحميل.\n  // المكتبتان تُحمّلان من الشبكة عند أول ضغط فقط فلا يثقل حجم الأداة.\n  function loadScript(src) {\n    return new Promise((resolve, reject) => {\n      const s = document.createElement('script');\n      s.src = src; s.async = true;\n      s.onload = resolve;\n      s.onerror = () => reject(new Error('تعذر تحميل المكتبة'));\n      document.head.appendChild(s);\n    });\n  }\n  let pdfLibsReady = false;\n  async function ensurePdfLibs() {\n    if (pdfLibsReady) return;\n    if (!window.html2canvas) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');\n    if (!(window.jspdf && window.jspdf.jsPDF)) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');\n    pdfLibsReady = true;\n  }\n\n  // ===== نظام التقارير المتعددة =====\n  const addBtn = document.getElementById('addReport');\n  const clearEntryBtn = document.getElementById('clearEntry');\n  const exportAllBtn = document.getElementById('exportAll');\n  const clearQueueBtn = document.getElementById('clearQueue');\n  const queueEl = document.getElementById('queue');\n  const queueListEl = document.getElementById('queueList');\n  const queueCountEl = document.getElementById('queueCount');\n\n  let reports = [];     // قائمة التقارير المضافة\n  let editIndex = -1;   // ‎-1‎ إضافة جديدة، أو فهرس التقرير الجاري تعديله\n  let lastDept = '';    // آخر قسم اختير، يُرحّل للتقرير التالي\n\n  const cleanName = s => (s || '').replace(/[\\\\/:*?\"<>|]/g, '').replace(/\\s+/g, ' ').trim();\n\n  // قراءة المدخلات الحالية إلى كائن تقرير\n  function readEntry() {\n    return {\n      course: metaCourse.value.trim(),\n      section: metaSection.value.trim(),\n      dept: metaDept.value.trim(),\n      testValue: inTest.value,\n      testName: currentTestName(),\n      mean: inMean.value,\n      sd: inSd.value,\n      total: gaTotal.value,\n      counts: GA_LABELS.reduce((o, l) => { o[l] = parseInt(gaSliders[l].value) || 0; return o; }, {})\n    };\n  }\n\n  // كتابة كائن تقرير إلى المدخلات (للتعديل وللتصدير)\n  function writeEntry(e) {\n    metaCourse.value = e.course;\n    metaSection.value = e.section;\n    metaDept.value = e.dept;\n    const sel = KEY_TO_SEL[e.testValue] || ['mid', '20'];\n    evalType.value = sel[0];\n    populateLimits(false);\n    if (sel[0] !== 'total') testLimit.value = sel[1];\n    syncTestKey();\n    inTest.value = e.testValue;\n    updateHint();\n    buildRangesTable();\n    inMean.value = e.mean;\n    inSd.value = e.sd;\n    gaTotal.value = e.total;\n    const tot = parseInt(e.total) || 0;\n    GA_LABELS.forEach(l => { gaSliders[l].disabled = tot <= 0; gaSliders[l].max = tot; gaSliders[l].value = (e.counts && e.counts[l]) || 0; });\n    syncGaToHidden();\n    enforceGaBudget();\n    analyze();\n  }\n\n  function entryValid() {\n    return allInputs()\n      && metaTrainer.value.trim() !== ''\n      && metaDept.value.trim() !== ''\n      && metaCourse.value.trim() !== ''\n      && metaSection.value.trim() !== ''\n      && !!TESTS[inTest.value];\n  }\n\n  function missingHint() {\n    if (!metaTrainer.value.trim()) return 'أدخل اسم المدرب في بيانات المدرب.';\n    if (!metaDept.value.trim()) return 'اختر القسم في بيانات المدرب.';\n    if (!metaCourse.value.trim()) return 'أدخل اسم المقرر.';\n    if (!metaSection.value.trim()) return 'أدخل رقم الشعبة.';\n    if (!allInputs()) return 'أكمل المتوسط والانحراف وتوزيع التقديرات.';\n    return '';\n  }\n\n  function setAddMode() { addBtn.textContent = 'إضافة تقرير'; }\n  function setEditMode() { addBtn.textContent = 'تحديث التقرير'; }\n\n  function addOrUpdate() {\n    const hint = missingHint();\n    if (hint) { return; }\n    const entry = readEntry();\n    const dupIdx = reports.findIndex((r, i) => r.section === entry.section && i !== editIndex);\n    if (dupIdx !== -1 && !confirm('رقم الشعبة «' + entry.section + '» موجود في القائمة. أتريد إضافته مع ذلك؟')) return;\n    if (editIndex === -1) {\n      reports.push(entry);\n    } else {\n      reports[editIndex] = entry;\n      editIndex = -1;\n      setAddMode();\n    }\n    lastDept = entry.dept;\n    // تثبيت موضع زر الإضافة بصريا: نعوّض إزاحة التمرير الناتجة عن إخفاء النتيجة\n    // وظهور القائمة، فلا تقفز الصفحة فجأة على الجوال\n    const anchorBefore = addBtn.getBoundingClientRect().top;\n    clearEntryFields(true);\n    renderQueue();\n    updateButtons();\n    const anchorAfter = addBtn.getBoundingClientRect().top;\n    window.scrollBy(0, anchorAfter - anchorBefore);\n  }\n\n  // مسح حقول التقرير والمؤشرات مع الإبقاء على بيانات المدرب\n  function clearEntryFields(carryDept) {\n    metaCourse.value = '';\n    metaSection.value = '';\n    inMean.value = '';\n    inSd.value = '';\n    gaTotal.value = '';\n    GA_LABELS.forEach(l => { gaSliders[l].value = 0; gaSliders[l].max = 0; gaSliders[l].disabled = true; gaHidden[l].value = 0; gaVals[l].textContent = '٠'; });\n    enforceGaBudget();\n    if (carryDept) metaDept.value = lastDept;\n    lastResult = null;\n    setPrompt('أكمل البيانات لتظهر نتائج التحليل');\n    clearResultCards();\n    result.classList.add('is-empty');\n  }\n\n  function clearEntry() {\n    editIndex = -1;\n    setAddMode();\n    clearEntryFields(true);\n    renderQueue();\n    updateButtons();\n  }\n\n  function editReport(i) {\n    editIndex = i;\n    writeEntry(reports[i]);\n    setEditMode();\n    renderQueue();\n    updateButtons();\n    const sec = document.getElementById('analyzerSection');\n    if (sec && sec.scrollIntoView) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });\n  }\n\n  function removeReport(i) {\n    reports.splice(i, 1);\n    if (editIndex === i) { editIndex = -1; setAddMode(); clearEntryFields(true); }\n    else if (editIndex > i) { editIndex--; }\n    renderQueue();\n    updateButtons();\n  }\n\n  function clearQueue() {\n    if (!reports.length) return;\n    if (!confirm('سيُفرغ كل التقارير المضافة (' + toAr(reports.length) + '). هل أنت متأكد؟')) return;\n    reports = [];\n    editIndex = -1;\n    setAddMode();\n    renderQueue();\n    updateButtons();\n  }\n\n  function renderQueue() {\n    if (!reports.length) { queueEl.style.display = 'none'; return; }\n    queueEl.style.display = 'block';\n    queueCountEl.textContent = 'التقارير المضافة (' + toAr(reports.length) + ')';\n    queueListEl.innerHTML = '';\n    reports.forEach((r, i) => {\n      const row = document.createElement('div');\n      row.className = 'queue-row' + (i === editIndex ? ' editing' : '');\n      const meta = document.createElement('div');\n      meta.className = 'q-meta';\n      const title = document.createElement('div');\n      title.className = 'q-title';\n      title.textContent = (r.course || '—') + ' • شعبة ' + (r.section || '—');\n      const sub = document.createElement('div');\n      sub.className = 'q-sub';\n      sub.textContent = r.testName + ' • المتوسط ' + toAr(r.mean);\n      meta.appendChild(title);\n      meta.appendChild(sub);\n      const acts = document.createElement('div');\n      acts.className = 'q-actions';\n      const ed = document.createElement('button');\n      ed.type = 'button'; ed.className = 'q-btn'; ed.textContent = (i === editIndex ? 'قيد التعديل' : 'تعديل');\n      ed.disabled = (i === editIndex);\n      ed.addEventListener('click', () => editReport(i));\n      const rm = document.createElement('button');\n      rm.type = 'button'; rm.className = 'q-btn q-del'; rm.textContent = 'حذف';\n      rm.addEventListener('click', () => removeReport(i));\n      acts.appendChild(ed);\n      acts.appendChild(rm);\n      row.appendChild(meta);\n      row.appendChild(acts);\n      queueListEl.appendChild(row);\n    });\n  }\n\n  function anyInput() {\n    if (metaCourse.value.trim() || metaSection.value.trim() || inMean.value.trim() || inSd.value.trim() || (parseInt(gaTotal.value) || 0) > 0) return true;\n    return GA_LABELS.some(l => (parseInt(gaSliders[l].value) || 0) > 0);\n  }\n  function allInputs() {\n    const mean = parseFloat(inMean.value), sd = parseFloat(inSd.value);\n    const total = parseInt(gaTotal.value) || 0;\n    const distributed = GA_LABELS.reduce((s, l) => s + (parseInt(gaSliders[l].value) || 0), 0);\n    return !isNaN(mean) && mean > 0 && !isNaN(sd) && sd >= 0 && total > 0 && distributed === total;\n  }\n  function updateButtons() {\n    const valid = entryValid();\n    addBtn.disabled = !valid;\n    clearEntryBtn.disabled = !(anyInput() || editIndex !== -1);\n    exportAllBtn.disabled = reports.length === 0;\n  }\n\n  // ===== تصدير كل التقارير في ملف PDF واحد، تقرير لكل صفحة =====\n  async function exportAll() {\n    if (!reports.length) return;\n    const printArea = document.getElementById('printArea');\n    const snapshot = readEntry();\n    const wasEditing = editIndex;\n    const orig = exportAllBtn.textContent;\n    exportAllBtn.disabled = true;\n    exportAllBtn.textContent = 'جارٍ الإنشاء...';\n    try {\n      await ensurePdfLibs();\n      const { jsPDF } = window.jspdf;\n      const pdf = new jsPDF('p', 'mm', 'a4');\n      const pageW = pdf.internal.pageSize.getWidth();\n      const pageH = pdf.internal.pageSize.getHeight();\n      const margin = 8;\n      const imgW = pageW - margin * 2;\n      const footerBand = 12;                              // حيز سفلي مخصص لترقيم الصفحات\n      const contentH = pageH - margin * 2 - footerBand;   // ارتفاع المحتوى دون شريط الترقيم\n      const footerEl = document.getElementById('pdfFooter');\n      const SCALE = 3;                                    // دقة أعلى للالتقاط لتقليل البكسلة عند التكبير\n\n      // المرور الأول: التقاط كل تقرير وحساب عدد صفحاته، لمعرفة الإجمالي قبل الترقيم\n      const items = [];\n      let totalPages = 0;\n      for (let i = 0; i < reports.length; i++) {\n        writeEntry(reports[i]);\n        if (!buildPrintSheet()) continue;\n        printArea.classList.add('pdf-cap');\n        const canvas = await html2canvas(printArea, {\n          scale: SCALE, backgroundColor: '#ffffff', useCORS: true,\n          width: 733, windowWidth: 760\n        });\n        printArea.classList.remove('pdf-cap');\n        const img = canvas.toDataURL('image/jpeg', 0.95);\n        const imgH = canvas.height * imgW / canvas.width;\n        const pageCount = Math.max(1, Math.ceil(imgH / contentH));\n        items.push({ img, imgH, pageCount });\n        totalPages += pageCount;\n      }\n\n      // المرور الثاني: إضافة الصفحات بترقيم متسلسل عبر الملف كاملا\n      let globalPage = 0;\n      let firstPage = true;\n      for (const it of items) {\n        for (let p = 0; p < it.pageCount; p++) {\n          globalPage++;\n          if (!firstPage) pdf.addPage();\n          firstPage = false;\n          pdf.addImage(it.img, 'JPEG', margin, margin - p * contentH, imgW, it.imgH);\n          // تبييض حيز الترقيم لمنع تداخل المحتوى معه في التقارير متعددة الصفحات\n          pdf.setFillColor(255, 255, 255);\n          pdf.rect(0, pageH - margin - footerBand, pageW, footerBand + margin, 'F');\n          // ترقيم الصفحة بخط Cairo عبر التقاطه صورةً\n          footerEl.textContent = 'الصفحة ' + toAr(globalPage) + ' من ' + toAr(totalPages);\n          const fc = await html2canvas(footerEl, { scale: 2, backgroundColor: '#ffffff', width: 733, windowWidth: 760 });\n          const fH = fc.height * imgW / fc.width;\n          pdf.addImage(fc.toDataURL('image/jpeg', 0.95), 'JPEG', margin, pageH - margin - fH, imgW, fH);\n        }\n      }\n      let fn;\n      if (reports.length === 1) {\n        const r = reports[0];\n        fn = ['تحليل', cleanName(r.course), cleanName(r.section), cleanName(r.testName)].filter(Boolean).join('-') + '.pdf';\n      } else {\n        fn = 'تحليل-النتائج-' + reports.length + '-تقارير.pdf';\n      }\n      pdf.save(fn);\n    } catch (e) {\n      printArea.classList.remove('pdf-cap');\n      alert('تعذر إنشاء ملف PDF. تحقق من اتصال الإنترنت ثم أعد المحاولة.');\n    } finally {\n      // استعادة ما كان معروضا قبل التصدير\n      if (wasEditing !== -1 && reports[wasEditing]) { writeEntry(reports[wasEditing]); editIndex = wasEditing; setEditMode(); }\n      else { writeEntry(snapshot); editIndex = -1; setAddMode(); }\n      exportAllBtn.textContent = orig;\n      renderQueue();\n      updateButtons();\n    }\n  }\n\n  addBtn.addEventListener('click', addOrUpdate);\n  clearEntryBtn.addEventListener('click', clearEntry);\n  exportAllBtn.addEventListener('click', exportAll);\n  clearQueueBtn.addEventListener('click', clearQueue);\n\n  // تحديث الأزرار مع كل تغيير في المدخلات\n  metaDept.addEventListener('change', updateButtons);\n  [metaTrainer, metaCourse, metaSection, inMean, inSd, gaTotal].forEach(el => el.addEventListener('input', updateButtons));\n  GA_LABELS.forEach(l => gaSliders[l].addEventListener('input', updateButtons));\n  updateButtons();\n  renderQueue();\n})();\n\n/* ============ المختبر التفاعلي (القسم ٥) ============ */\n(function() {\n  const TOTAL = 30;\n  const LAB_TESTS = {\n    mid_20:   { max:20,  tiers:{ مقبول:12, جيد:14, 'جيد جدا':16, ممتاز:18 } },\n    fin_40:   { max:40,  tiers:{ مقبول:24, جيد:28, 'جيد جدا':32, ممتاز:36 } },\n    total100: { max:100, tiers:{ مقبول:60, جيد:70, 'جيد جدا':80, ممتاز:90 } }\n  };\n  const LABELS = ['ضعيف','مقبول','جيد','جيد جدا','ممتاز'];\n\n  const labTest = document.getElementById('labTest');\n  const remaining = document.getElementById('labRemaining');\n  const remainNote = document.getElementById('labRemainNote');\n  const sliders = {\n    ضعيف: document.getElementById('lrFail'),\n    مقبول: document.getElementById('lrPass'),\n    جيد: document.getElementById('lrGood'),\n    'جيد جدا': document.getElementById('lrVgood'),\n    ممتاز: document.getElementById('lrExcellent')\n  };\n  const valSpans = {\n    ضعيف: document.getElementById('lvFail'),\n    مقبول: document.getElementById('lvPass'),\n    جيد: document.getElementById('lvGood'),\n    'جيد جدا': document.getElementById('lvVgood'),\n    ممتاز: document.getElementById('lvExcellent')\n  };\n  const labMean = document.getElementById('labMean');\n  const labSd = document.getElementById('labSd');\n  const labShape = document.getElementById('labShape');\n  const labNarrative = document.getElementById('labNarrative');\n  const labChart = document.getElementById('labChart');\n\n  if (!labTest) return; // أمان: لا يعمل إن غاب القسم\n\n  function repScores(t) {\n    const m = t.tiers, mx = t.max;\n    return [ (0+m['مقبول'])/2, (m['مقبول']+m['جيد'])/2, (m['جيد']+m['جيد جدا'])/2, (m['جيد جدا']+m['ممتاز'])/2, (m['ممتاز']+mx)/2 ];\n  }\n  function getCounts() { return LABELS.map(l => parseInt(sliders[l].value) || 0); }\n  function computeStats(arr, t) {\n    const rep = repScores(t);\n    let nn=0, sum=0;\n    for (let i=0;i<5;i++){ nn+=arr[i]; sum+=arr[i]*rep[i]; }\n    if (nn===0) return null;\n    const mean=sum/nn;\n    let vs=0; for(let i=0;i<5;i++) vs+=arr[i]*Math.pow(rep[i]-mean,2);\n    return { n:nn, mean, sd:Math.sqrt(vs/nn) };\n  }\n\n  // كاشف الشكل (نسخة طبق الأصل من وحدة التحليل)\n  function labDetectShape(arr) {\n    const total = arr.reduce((a,b)=>a+b,0);\n    if (total === 0) return 'وزّع المتدربين لعرض الشكل';\n    const n = arr.length, mx = Math.max(...arr), mid = (n-1)/2;\n    const peaks = [];\n    let i = 0;\n    while (i < n) {\n      if (arr[i] === 0) { i++; continue; }\n      let j = i;\n      while (j+1 < n && arr[j+1] === arr[i]) j++;\n      const L = i>0?arr[i-1]:-1, R = j+1<n?arr[j+1]:-1;\n      if (arr[i]>=L && arr[i]>=R && arr[i]>=mx*0.5) peaks.push({start:i,end:j,val:arr[i]});\n      i = j+1;\n    }\n    function deepValley(a,b){ if(b.start<=a.end+1) return Infinity; return Math.min(...arr.slice(a.end+1,b.start)); }\n    let sep = peaks.length>0?1:0;\n    for (let k=0;k<peaks.length-1;k++) if (deepValley(peaks[k],peaks[k+1])<=Math.min(peaks[k].val,peaks[k+1].val)*0.6) sep++;\n    let massCenter=0; for(let k=0;k<n;k++) massCenter+=k*arr[k]; massCenter/=total;\n    const nonZero = arr.filter(v=>v>0);\n    if (peaks.length>=2) {\n      for (let x=0;x<peaks.length;x++) for (let y=x+1;y<peaks.length;y++) {\n        const a=peaks[x], b=peaks[y], top=Math.max(a.val,b.val);\n        if (a.val<total*0.25||b.val<total*0.25) continue;\n        if (a.val<top*0.40||b.val<top*0.40) continue;\n        if (Math.min(a.val,b.val)<top*0.70) continue;\n        if (deepValley(a,b)>Math.min(a.val,b.val)*0.6) continue;\n        if (a.val+b.val<total*0.55) continue;\n        if (Math.abs(massCenter-mid)>0.60) continue;\n        let higherElsewhere=false;\n        for (const p of peaks){ if(p===a||p===b)continue; if(p.val>Math.min(a.val,b.val)){higherElsewhere=true;break;} }\n        if (higherElsewhere) continue;\n        let centralBreaker=false;\n        for (const p of peaks){ if(p===a||p===b)continue; if(p.start>a.end&&p.end<b.start&&p.val>top*0.5){centralBreaker=true;break;} }\n        if (centralBreaker) continue;\n        let outsideBig=false;\n        for (const p of peaks){ if(p===a||p===b)continue; const bt=p.start>a.end&&p.end<b.start; if(!bt&&p.val>top*0.5){outsideBig=true;break;} }\n        if (outsideBig) continue;\n        return 'ثنائي القمة';\n      }\n    }\n    if (sep>=3){ const mp=peaks.filter(p=>p.val===mx); if(mp.length>=2) return 'منتظم مسطح'; }\n    if (sep>=3){ const mp=peaks.find(p=>p.val===mx); if(!(mp.start>0&&mp.end<n-1)) return 'منتظم مسطح'; }\n    const minNZ=Math.min(...nonZero);\n    const massCentral=Math.abs(massCenter-mid)<=0.5;\n    const singlePeak=(peaks.length===1&&(peaks[0].end-peaks[0].start+1)<nonZero.length);\n    if (nonZero.length>=4&&minNZ>=mx*0.5&&massCentral&&!singlePeak) return 'منتظم مسطح';\n    const peakPos=[]; for(let k=0;k<n;k++) if(arr[k]===mx) peakPos.push(k);\n    const peakCenter=peakPos.reduce((a,b)=>a+b,0)/peakPos.length;\n    const pSide=peakCenter>mid?1:(peakCenter<mid?-1:0);\n    const mSide=massCenter>mid+0.05?1:(massCenter<mid-0.05?-1:0);\n    if (pSide!==0&&mSide!==0&&pSide!==mSide&&nonZero.length>=4) return 'منتظم مسطح';\n    const peakUp=peakCenter>mid+0.5, peakDn=peakCenter<mid-0.5;\n    const massUp=massCenter>mid+0.4, massDn=massCenter<mid-0.4;\n    if ((peakUp||massUp)&&!(peakDn||massDn)) return 'مائل إلى القمة';\n    if ((peakDn||massDn)&&!(peakUp||massUp)) return 'مائل إلى القاع';\n    return 'جرسي';\n  }\n\n  function drawLabChart(arr) {\n    const ctx = labChart.getContext('2d');\n    const dpr = window.devicePixelRatio || 1;\n    const W=600, H=250;\n    labChart.width=W*dpr; labChart.height=H*dpr;\n    labChart.style.width='100%'; labChart.style.maxWidth=W+'px';\n    ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);\n    ctx.clearRect(0,0,W,H);\n    const pad={l:16,r:16,t:32,b:34}, pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;\n    const mx=Math.max(...arr,1), nn=arr.length, slot=pw/nn;\n    const bw=Math.min(slot*0.42, 50);   // عرض العمود: أنحف وأكثر تناسقا\n    const colors=['#a8463a','#b8862f','#4a7d8c','#3a8a85','#0e6b66'];\n    const base=pad.t+ph;\n    const ar = s => String(s).replace(/[0-9]/g, d => \"٠١٢٣٤٥٦٧٨٩\"[d]);\n    ctx.strokeStyle='#dce6e6'; ctx.lineWidth=1;\n    ctx.beginPath(); ctx.moveTo(pad.l,base); ctx.lineTo(pad.l+pw,base); ctx.stroke();\n    arr.forEach((v,idx)=>{\n      const cx = pad.l + idx*slot + slot/2;\n      const x = cx - bw/2;\n      const h = v>0 ? Math.max(4, (v/mx)*ph) : 0;\n      const y = base - h;\n      if (h > 0) {\n        const r = Math.min(6, bw/2, h);\n        ctx.fillStyle=colors[idx];\n        ctx.beginPath();\n        ctx.moveTo(x, base);\n        ctx.lineTo(x, y+r);\n        ctx.quadraticCurveTo(x, y, x+r, y);\n        ctx.lineTo(x+bw-r, y);\n        ctx.quadraticCurveTo(x+bw, y, x+bw, y+r);\n        ctx.lineTo(x+bw, base);\n        ctx.closePath(); ctx.fill();\n      }\n      ctx.fillStyle='#16302e'; ctx.font='700 13px Cairo, sans-serif'; ctx.textAlign='center';\n      ctx.fillText(ar(v), cx, (v>0 ? y : base) - 8);\n      ctx.fillStyle='#3f5a58'; ctx.font='12px Cairo, sans-serif';\n      ctx.fillText(LABELS[idx], cx, base+18);\n    });\n  }\n\n  function enforceBudget(changed) {\n    let others=0; LABELS.forEach(l=>{ if(l!==changed) others+=parseInt(sliders[l].value)||0; });\n    const allowed=TOTAL-others;\n    if (changed) { let v=parseInt(sliders[changed].value)||0; if(v>allowed){ v=allowed; sliders[changed].value=v; } }\n    let used=0; LABELS.forEach(l=>used+=parseInt(sliders[l].value)||0);\n    const remain=TOTAL-used;\n    LABELS.forEach(l=>{ const cur=parseInt(sliders[l].value)||0; sliders[l].max=cur+remain; });\n    return remain;\n  }\n\n  let prev=null;\n  function update(changed) {\n    const t=LAB_TESTS[labTest.value];\n    const remain=enforceBudget(changed);\n    const arr=getCounts();\n    const toAr = s => String(s).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);\n    LABELS.forEach(l=>{ valSpans[l].textContent=toAr(sliders[l].value); });\n    remaining.textContent=toAr(remain);\n    remainNote.textContent = remain===0 ? '' : 'وزّع المتبقي على التقديرات.';\n    const stats=computeStats(arr,t);\n    drawLabChart(arr);\n    if (!stats) {\n      labMean.textContent='—'; labSd.textContent='—';\n      labShape.textContent='وزّع المتدربين لعرض الشكل';\n      labNarrative.textContent='حرّك أي شريط وراقب كيف يتغير المتوسط والانحراف والشكل معا.';\n      prev=null; return;\n    }\n    const shape=labDetectShape(arr);\n    labMean.textContent=toAr(stats.mean.toFixed(1))+' من '+toAr(t.max);\n    labSd.textContent=toAr(stats.sd.toFixed(2));\n    labShape.textContent=shape;\n    let narrative='';\n    if (prev) {\n      const dM=stats.mean-prev.mean, dS=stats.sd-prev.sd, parts=[];\n      if (Math.abs(dM)>0.05) parts.push(dM>0?'ارتفع المتوسط (تحركت القمة نحو التقديرات العليا)':'انخفض المتوسط (تحركت القمة نحو التقديرات الدنيا)');\n      if (Math.abs(dS)>0.05) parts.push(dS>0?'اتسع الانحراف (تباعدت الدرجات)':'ضاق الانحراف (تقاربت الدرجات)');\n      narrative = parts.length ? parts.join('، ')+'.' : 'لم يتغير المتوسط ولا الانحراف بصورة ملموسة.';\n    } else {\n      narrative='حرّك أي شريط وراقب كيف يتغير المتوسط والانحراف والشكل معا.';\n    }\n    labNarrative.textContent=narrative;\n    prev={ mean:stats.mean, sd:stats.sd };\n  }\n\n  const PRESETS = {\n    bell:[3,7,10,7,3], top:[0,2,5,10,13], bottom:[13,10,5,2,0], bimodal:[12,3,0,3,12], flat:[6,6,6,6,6]\n  };\n  function applyPreset(name) {\n    const p=PRESETS[name]; if(!p) return;\n    LABELS.forEach(l=>{ sliders[l].max=30; });\n    LABELS.forEach((l,idx)=>{ sliders[l].value=p[idx]; });\n    prev=null; update();\n  }\n\n  labTest.addEventListener('change', () => { prev=null; update(); });\n  LABELS.forEach(l => sliders[l].addEventListener('input', () => update(l)));\n  document.querySelectorAll('button[data-lpreset]').forEach(btn => btn.addEventListener('click', () => applyPreset(btn.dataset.lpreset)));\n  document.getElementById('labReset').addEventListener('click', () => {\n    LABELS.forEach(l=>{ sliders[l].max=30; sliders[l].value=0; });\n    prev=null; update();\n  });\n\n  update();\n})();\n\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
